spring.application.name=CampShare
# Nama Database: campushare_db (Pastikan teman DB Admin sudah membuat ini di phpMyAdmin)
spring.datasource.url=jdbc:mysql://localhost:3306/campushare_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Konfigurasi JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true