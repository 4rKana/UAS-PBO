<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <script th:src="@{/auth-guard.js}"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CampusShare - Transaksi Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        sale: '#ff6b00',
                        rent: '#00a843',
                        darkbg: '#18181b',
                        cardbg: '#27272a',
                        darkborder: '#3f3f46'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding-bottom: 72px; }

        /* ── SIDEBAR / MOBILE NAV ── */
        .mobile-nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .mobile-nav-overlay.open { opacity: 1; visibility: visible; }

        .mobile-nav {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #fff;
            z-index: 1000;
            padding: 24px 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        html.dark .mobile-nav { background: #1c1f2e; }
        .mobile-nav.open { left: 0; }

        .mobile-nav .close-btn {
            align-self: flex-end;
            background: none;
            border: none;
            font-size: 24px;
            color: #6b7280;
            cursor: pointer;
            padding: 4px 8px;
            margin-bottom: 16px;
        }
        html.dark .mobile-nav .close-btn { color: #9ca3af; }

        .mobile-nav .nav-logo-mobile {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .mobile-nav .nav-logo-mobile .logo-icon {
            width: 40px;
            height: 40px;
            background: #3b5bdb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mobile-nav .nav-logo-mobile .logo-icon svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            fill: none;
        }
        .mobile-nav .nav-logo-mobile span {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
        }
        html.dark .mobile-nav .nav-logo-mobile span { color: #fff; }

        .mobile-nav .nav-links-mobile {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .mobile-nav .nav-links-mobile a {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #6b7280;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .mobile-nav .nav-links-mobile a:hover { background: #f3f4f6; }
        .mobile-nav .nav-links-mobile a.active { background: #eef2ff; color: #3b5bdb; }
        html.dark .mobile-nav .nav-links-mobile a { color: #9ca3af; }
        html.dark .mobile-nav .nav-links-mobile a:hover { background: #2d3040; }
        html.dark .mobile-nav .nav-links-mobile a.active { background: #1e2a4a; color: #60a5fa; }

        .mobile-nav .nav-divider { border-top: 1px solid #e5e7ef; margin: 12px 0; }
        html.dark .mobile-nav .nav-divider { border-top-color: #3f3f46; }

        /* ── BOTTOM NAV (HP) ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #fff;
            border-top: 1px solid #e5e7ef;
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
            transition: background 0.25s, border-color 0.25s;
            padding: 0 8px;
        }
        html.dark .bottom-nav { background: #1c1f2e; border-top-color: #3f3f46; }

        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            color: #9ca3af;
            padding: 4px 12px;
            border-radius: 8px;
            transition: color 0.15s, background 0.15s;
            min-width: 56px;
        }
        .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .bottom-nav a.active { color: #3b5bdb; }
        .bottom-nav a.active svg { stroke: #3b5bdb; }
        html.dark .bottom-nav a.active { color: #60a5fa; }
        html.dark .bottom-nav a.active svg { stroke: #60a5fa; }

        @media (min-width: 768px) {
            .mobile-nav-overlay, .mobile-nav, .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
        @media (max-width: 767px) {
            .desktop-nav, .desktop-search { display: none !important; }
        }
    </style>
</head>

    <!-- ─── JAVASCRIPT ─── -->
    <script>
        // ── BUKA/TUTUP SIDEBAR ──
        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            nav.classList.toggle('open');
            overlay.classList.toggle('open');
            document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
        }
        function closeMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            nav.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        // ── DARK MODE ──
        const html = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const themeToggleMobile = document.getElementById('theme-toggle-mobile');
        const themeLabelMobile = document.getElementById('theme-label-mobile');

        function updateIcons() {
            if (html.classList.contains('dark')) {
                if (sunIcon) sunIcon.classList.remove('hidden');
                if (moonIcon) moonIcon.classList.add('hidden');
                if (themeLabelMobile) themeLabelMobile.textContent = 'Mode Terang';
            } else {
                if (sunIcon) sunIcon.classList.add('hidden');
                if (moonIcon) moonIcon.classList.remove('hidden');
                if (themeLabelMobile) themeLabelMobile.textContent = 'Mode Gelap';
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }
        updateIcons();

        function toggleTheme() {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            updateIcons();
        }

        if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
        if (themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);

        // ── INISIALISASI HALAMAN ──
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Cek Login
            const idUser = localStorage.getItem("idUser");
            const username = localStorage.getItem("username");

            if (!idUser) {
                alert("Akses ditolak! Anda harus login terlebih dahulu.");
                window.location.href = "login";
                return;
            }

            // 2. Tampilkan inisial nama di avatar
            if (username) {
                const inisial = username.split(" ").map(n => n[0]).join("").toUpperCase().substring(0, 2);
                document.getElementById("nav-avatar").textContent = inisial;
            }

            // 3. Langsung panggil data dari backend untuk tab "Membeli/Meminjam"
            fetchDataMembeliMeminjam(idUser);
        });

        // ── FUNGSI MENGAMBIL DATA TRANSAKSI DARI BACKEND ──
        function fetchDataMembeliMeminjam(idUser) {
            const container = document.getElementById('transaction-list');
            container.innerHTML = `<p class="text-center text-gray-500 py-10">Mengambil data transaksi dari server...</p>`;

            const fetchBeli = fetch(`http://localhost:8080/api/transaksi-beli/user/${idUser}`).then(res => res.ok ? res.json() : []);
            const fetchPinjam = fetch(`http://localhost:8080/api/pinjam/user/${idUser}`).then(res => res.ok ? res.json() : []);

            Promise.all([fetchBeli, fetchPinjam])
                .then(([dataBeli, dataPinjam]) => {
                    let semuaTransaksi = [];
                    
                    if (dataBeli.length > 0) {
                        dataBeli.forEach(trx => { trx.tipeOrder = 'BELI'; semuaTransaksi.push(trx); });
                    }
                    if (dataPinjam.length > 0) {
                        dataPinjam.forEach(trx => { trx.tipeOrder = 'SEWA'; semuaTransaksi.push(trx); });
                    }

                    if (semuaTransaksi.length === 0) {
                        container.innerHTML = `
                            <div class="text-center py-10 bg-white dark:bg-cardbg rounded-xl shadow-sm">
                                <p class="text-gray-500 dark:text-gray-400">Anda belum pernah melakukan pembelian atau penyewaan.</p>
                                <a href="dashboard.html" class="inline-block mt-4 text-blue-500 font-semibold hover:underline">Mulai Cari Barang</a>
                            </div>`;
                        return;
                    }

                    let htmlContent = "";
                    semuaTransaksi.forEach(trx => {
                        const namaBarang = trx.barang?.namaBarang || 'Barang Tidak Diketahui';
                        const harga = trx.totalHarga || trx.hargaTotal || 0;
                        const formatHarga = `Rp ${harga.toLocaleString('id-ID')}`;
                        const status = trx.status || 'PROSES';
                        
                        const labelBg = trx.tipeOrder === 'BELI' ? 'bg-orange-50 dark:bg-orange-900/20 text-orange-600' : 'bg-green-50 dark:bg-green-900/20 text-green-600';
                        
                        let statusText = status;
                        let statusColor = "text-primary";
                        if (status === "SELESAI") { statusColor = "text-green-600 dark:text-green-400"; statusText = "Transaksi Selesai"; }
                        else if (status === "DIAJUKAN") { statusColor = "text-yellow-600 dark:text-yellow-400"; statusText = "Menunggu Persetujuan Penjual"; }

                        htmlContent += `
                            <div class="bg-white dark:bg-cardbg rounded-2xl p-5 border border-gray-200 dark:border-darkborder shadow-sm transition-colors mb-4">
                                <div class="flex flex-wrap items-start justify-between gap-4">
                                    <div>
                                        <h3 class="text-lg font-bold text-gray-900 dark:text-white">${namaBarang}</h3>
                                        <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">ID Transaksi: ${trx.id || trx.idTransaksi || '-'}</p>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-lg font-bold text-primary">${formatHarga}</span>
                                        <span class="block text-sm font-semibold ${labelBg} px-3 py-0.5 rounded-full mt-1">${trx.tipeOrder}</span>
                                    </div>
                                </div>
                                <div class="mt-4 pt-4 border-t border-gray-100 dark:border-darkborder/50">
                                    <p class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Status Saat Ini: <span class="${statusColor}">${statusText}</span></p>
                                </div>
                            </div>
                        `;
                    });

                    window.buyContentHTML = htmlContent;
                    container.innerHTML = htmlContent;
                })
                .catch(error => {
                    container.innerHTML = `<p class="text-center text-red-500 py-10">Gagal mengambil riwayat transaksi dari server.</p>`;
                });
        }

        // ── TAB SWITCHER ──
        const tabBuy = document.getElementById('tab-buy');
        const tabSell = document.getElementById('tab-sell');
        const transactionList = document.getElementById('transaction-list');

        const sellContentHTML = `
            <div class="text-center py-10 bg-white dark:bg-cardbg rounded-xl shadow-sm border border-gray-200 dark:border-darkborder">
                <p class="text-gray-500 dark:text-gray-400">Belum ada pesanan masuk untuk barang yang Anda iklankan.</p>
                <p class="text-sm text-gray-400 mt-2">(Fitur riwayat penjualan sedang dalam pengembangan)</p>
            </div>
        `;

        tabBuy.addEventListener('click', () => {
            tabBuy.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-sm";
            tabSell.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200";
            transactionList.innerHTML = window.buyContentHTML || "<p class='text-center'>Memuat...</p>";
        });

        tabSell.addEventListener('click', () => {
            tabSell.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-sm";
            tabBuy.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200";
            transactionList.innerHTML = sellContentHTML;
        });

        // 1. Ambil nama user dari LocalStorage
            const username = localStorage.getItem("username");
            
            // 2. Jika ada nama, buat inisial dan masukkan ke avatar
            if (username) {
                const inisial = username.split(" ").map(n => n[0]).join("").toUpperCase().substring(0, 2);
                const avatarEl = document.getElementById("dashboard-avatar");
                if (avatarEl) {
                    avatarEl.textContent = inisial;
                }
            }
    </script>
