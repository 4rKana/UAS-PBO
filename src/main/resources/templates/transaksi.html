<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <script th:src="@{/auth-guard.js}"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CampusShare - Transaksi Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        sale: '#ff6b00',
                        rent: '#00a843',
                        darkbg: '#18181b',
                        cardbg: '#27272a',
                        darkborder: '#3f3f46'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding-bottom: 72px; }

        /* ── SIDEBAR / MOBILE NAV ── */
        .mobile-nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .mobile-nav-overlay.open { opacity: 1; visibility: visible; }

        .mobile-nav {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #fff;
            z-index: 1000;
            padding: 24px 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        html.dark .mobile-nav { background: #1c1f2e; }
        .mobile-nav.open { left: 0; }

        .mobile-nav .close-btn {
            align-self: flex-end;
            background: none;
            border: none;
            font-size: 24px;
            color: #6b7280;
            cursor: pointer;
            padding: 4px 8px;
            margin-bottom: 16px;
        }
        html.dark .mobile-nav .close-btn { color: #9ca3af; }

        .mobile-nav .nav-logo-mobile {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .mobile-nav .nav-logo-mobile .logo-icon {
            width: 40px;
            height: 40px;
            background: #3b5bdb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mobile-nav .nav-logo-mobile .logo-icon svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            fill: none;
        }
        .mobile-nav .nav-logo-mobile span {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
        }
        html.dark .mobile-nav .nav-logo-mobile span { color: #fff; }

        .mobile-nav .nav-links-mobile {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .mobile-nav .nav-links-mobile a {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #6b7280;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .mobile-nav .nav-links-mobile a:hover { background: #f3f4f6; }
        .mobile-nav .nav-links-mobile a.active { background: #eef2ff; color: #3b5bdb; }
        html.dark .mobile-nav .nav-links-mobile a { color: #9ca3af; }
        html.dark .mobile-nav .nav-links-mobile a:hover { background: #2d3040; }
        html.dark .mobile-nav .nav-links-mobile a.active { background: #1e2a4a; color: #60a5fa; }

        .mobile-nav .nav-divider { border-top: 1px solid #e5e7ef; margin: 12px 0; }
        html.dark .mobile-nav .nav-divider { border-top-color: #3f3f46; }

        /* ── BOTTOM NAV (HP) ── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: #fff;
            border-top: 1px solid #e5e7ef;
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
            transition: background 0.25s, border-color 0.25s;
            padding: 0 8px;
        }
        html.dark .bottom-nav { background: #1c1f2e; border-top-color: #3f3f46; }

        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            color: #9ca3af;
            padding: 4px 12px;
            border-radius: 8px;
            transition: color 0.15s, background 0.15s;
            min-width: 56px;
        }
        .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .bottom-nav a.active { color: #3b5bdb; }
        .bottom-nav a.active svg { stroke: #3b5bdb; }
        html.dark .bottom-nav a.active { color: #60a5fa; }
        html.dark .bottom-nav a.active svg { stroke: #60a5fa; }

        @media (min-width: 768px) {
            .mobile-nav-overlay, .mobile-nav, .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
        @media (max-width: 767px) {
            .desktop-nav, .desktop-search { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkbg dark:text-gray-200 min-h-screen transition-all duration-300">

    <!-- ─── HEADER ─── -->
    <header class="bg-white dark:bg-darkbg border-b border-gray-200 dark:border-darkborder/50 sticky top-0 z-50 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>

            <div class="flex items-center gap-5">

                    <a href="papan-request" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white px-4 py-2 rounded-xl transition-all">Request</a>

                        <svg id="sun-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" />
                        </svg>
                        <svg id="moon-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
                        </svg>
                    </button>

                    <a href="roomchat" class="p-2 text-gray-400 hover:text-gray-500 relative flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-cardbg transition-colors">

    <!-- ─── JAVASCRIPT ─── -->
    <script>
   // ── BUKA/TUTUP SIDEBAR ──
        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            nav.classList.toggle('open');
            overlay.classList.toggle('open');
            document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
        }
        function closeMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            nav.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        // ── DARK MODE ──
        const html = document.documentElement;
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const themeToggleMobile = document.getElementById('theme-toggle-mobile');
        const themeLabelMobile = document.getElementById('theme-label-mobile');

        function updateIcons() {
            if (html.classList.contains('dark')) {
                if (sunIcon) sunIcon.classList.remove('hidden');
                if (moonIcon) moonIcon.classList.add('hidden');
                if (themeLabelMobile) themeLabelMobile.textContent = 'Mode Terang';
            } else {
                if (sunIcon) sunIcon.classList.add('hidden');
                if (moonIcon) moonIcon.classList.remove('hidden');
                if (themeLabelMobile) themeLabelMobile.textContent = 'Mode Gelap';
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }
        updateIcons();

        function toggleTheme() {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            updateIcons();
        }

        if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
        if (themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);


        // =========================================================
        // ── LOGIKA TRANSAKSI DINAMIS ──
        // =========================================================
        
        // Simpan HTML sementara agar bisa pindah tab dengan mulus
        window.buyContentHTML = `<p class="text-center text-gray-500 py-10">Memuat riwayat pembelian...</p>`;
        window.sellContentHTML = `<p class="text-center text-gray-500 py-10">Memuat riwayat penjualan...</p>`;

        // ── INISIALISASI HALAMAN ──
        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem("username");
            const idUser = localStorage.getItem("idUser"); // Ambil ID User dari lokal
            
            // Tampilkan inisial nama di avatar
            if (username) {
                const inisial = username.split(" ").map(n => n[0]).join("").toUpperCase().substring(0, 2);
                const avatarEl = document.getElementById("dashboard-avatar");
                if (avatarEl) avatarEl.textContent = inisial;
            }

            if (idUser) {
                // Langsung jalankan 2 fungsi untuk menarik data pembeli & penjual
                fetchDataMembeliMeminjam(idUser);
                fetchDataMenjualMenyewakan(idUser);
            } else {
                document.getElementById('transaction-list').innerHTML = 
                    `<p class="text-center text-red-500 py-10">Silakan login terlebih dahulu untuk melihat transaksi.</p>`;
            }
        });

// ── FUNGSI 1: MENGAMBIL DATA PEMBELIAN & PEMINJAMAN ──
        function fetchDataMembeliMeminjam(idUser) {
            const fetchBeli = fetch(`/api/transaksi-beli/user/${idUser}`).then(res => res.ok ? res.json() : []);
            const fetchPinjam = fetch(`/api/pinjam/user/${idUser}`).then(res => res.ok ? res.json() : []);

            Promise.all([fetchBeli, fetchPinjam])
                .then(([dataBeli, dataPinjam]) => {
                    let semuaTransaksi = [];
                    
                    if (dataBeli.length > 0) {
                        dataBeli.forEach(trx => { trx.tipeOrder = 'BELI'; semuaTransaksi.push(trx); });
                    }
                    if (dataPinjam.length > 0) {
                        dataPinjam.forEach(trx => { trx.tipeOrder = 'SEWA'; semuaTransaksi.push(trx); });
                    }

                    if (semuaTransaksi.length === 0) {
                        window.buyContentHTML = `
                            <div class="text-center py-10 bg-white dark:bg-cardbg rounded-xl shadow-sm">
                                <p class="text-gray-500 dark:text-gray-400">Anda belum pernah melakukan pembelian atau penyewaan.</p>
                                <a href="dashboard" class="inline-block mt-4 text-primary font-semibold hover:underline">Mulai Cari Barang</a>
                            </div>`;
                    } else {
                        let htmlContent = "";
                        semuaTransaksi.forEach(trx => {
                            const namaBarang = trx.barang?.namaBarang || 'Barang Tidak Diketahui';
                            
                            // Perbaikan pengambilan Harga: Jika totalHarga kosong, ambil dari hargaBarang milik objek barang
                            const harga = trx.totalHarga || trx.hargaTotal || trx.barang?.hargaBarang || 0;
                            const formatHarga = `Rp ${harga.toLocaleString('id-ID')}`;
                            
                            const status = (trx.status || 'PROSES').toUpperCase();
                            const idTrx = trx.id || trx.idTransaksi || '-';
                            
                            const labelBg = trx.tipeOrder === 'BELI' ? 'bg-orange-50 dark:bg-orange-900/20 text-orange-600' : 'bg-green-50 dark:bg-green-900/20 text-green-600';
                            
                            let statusText = status;
                            let statusColor = "text-primary";
                            if (status === "SELESAI") { statusColor = "text-green-600 dark:text-green-400"; statusText = "Transaksi Selesai"; }
                            else if (status === "DIAJUKAN" || status === "BOOKED" || status === "PROSES") { statusColor = "text-yellow-600 dark:text-yellow-400"; statusText = "Sedang Booked / Proses"; }

                            htmlContent += `
                                <div class="bg-white dark:bg-cardbg rounded-2xl p-5 border border-gray-200 dark:border-darkborder shadow-sm transition-colors mb-4 hover:shadow-md">
                                    <div class="flex flex-wrap items-start justify-between gap-4">
                                        <div>
                                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">${namaBarang}</h3>
                                            <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">ID Transaksi: <span class="font-mono text-gray-700 dark:text-gray-300">${idTrx}</span></p>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-lg font-bold text-primary">${formatHarga}</span>
                                            <span class="block text-sm font-semibold ${labelBg} px-3 py-0.5 rounded-full mt-1">${trx.tipeOrder}</span>
                                        </div>
                                    </div>
                                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-darkborder/50">
                                        <p class="text-sm font-semibold text-gray-700 dark:text-gray-300">Status Saat Ini: <span class="${statusColor}">${statusText}</span></p>
                                    </div>
                                </div>
                            `;
                        });
                        window.buyContentHTML = htmlContent;
                    }

                    if(document.getElementById('tab-buy').classList.contains('bg-primary')) {
                        document.getElementById('transaction-list').innerHTML = window.buyContentHTML;
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    window.buyContentHTML = `<p class="text-center text-red-500 py-10">Gagal memuat riwayat pembelian.</p>`;
                });
        }

// ── FUNGSI 2: MENGAMBIL DATA PENJUALAN & PENYEWAAN ──
        function fetchDataMenjualMenyewakan(idUser) {
            const fetchBeliAll = fetch(`/api/transaksi-beli`).then(res => res.ok ? res.json() : []);
            const fetchPinjamAll = fetch(`/api/pinjam`).then(res => res.ok ? res.json() : []);

            Promise.all([fetchBeliAll, fetchPinjamAll])
                .then(([dataBeli, dataPinjam]) => {
                    let semuaPenjualan = [];
                    
                    if (dataBeli.length > 0) {
                        const filterBeli = dataBeli.filter(trx => 
                            trx.barang?.pemilik?.idUser && 
                            String(trx.barang.pemilik.idUser) === String(idUser)
                        );
                        filterBeli.forEach(trx => { trx.tipeOrder = 'DIJUAL'; semuaPenjualan.push(trx); });
                    }
                    if (dataPinjam.length > 0) {
                        const filterPinjam = dataPinjam.filter(trx => 
                            trx.barang?.pemilik?.idUser && 
                            String(trx.barang.pemilik.idUser) === String(idUser)
                        );
                        filterPinjam.forEach(trx => { trx.tipeOrder = 'DISEWAKAN'; semuaPenjualan.push(trx); });
                    }

                    if (semuaPenjualan.length === 0) {
                        window.sellContentHTML = `
                            <div class="text-center py-10 bg-white dark:bg-cardbg rounded-xl shadow-sm border border-gray-200 dark:border-darkborder">
                                <p class="text-gray-500 dark:text-gray-400">Belum ada pesanan masuk untuk barang yang Anda iklankan.</p>
                            </div>`;
                    } else {
                        let htmlContent = "";
                        semuaPenjualan.forEach(trx => {
                            const namaBarang = trx.barang?.namaBarang || 'Barang Tidak Diketahui';
                            const namaPembeli = trx.pembeli?.username || trx.peminjam?.username || 'Seseorang';
                            const harga = trx.totalHarga || trx.hargaTotal || trx.barang?.hargaBarang || 0;
                            const formatHarga = `Rp ${harga.toLocaleString('id-ID')}`;
                            const status = (trx.status || 'PROSES').toUpperCase();
                            const idTrx = trx.id || trx.idTransaksi || '';
                            
                            const labelBg = trx.tipeOrder === 'DIJUAL' ? 'bg-orange-50 dark:bg-orange-900/20 text-orange-600' : 'bg-green-50 dark:bg-green-900/20 text-green-600';
                            
                            let statusColor = "text-primary";
                            let statusText = status;
                            let actionButton = "";

                            // Logika Tombol Aksi otomatis menggunakan idTrx
                            if (status === "SELESAI") { 
                                statusColor = "text-green-600 dark:text-green-400"; 
                                statusText = "Transaksi Selesai"; 
                            } else if (status === "DIAJUKAN" || status === "PROSES" || status === "PENDING") { 
                                statusColor = "text-yellow-600 dark:text-yellow-400"; 
                                statusText = "Menunggu Konfirmasi Anda"; 
                                
                                if (trx.tipeOrder === 'DIJUAL') {
                                    actionButton = `<button onclick="konfirmasiBeli('${idTrx}', 'booking')" class="mt-4 w-full bg-primary hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors shadow-sm">Terima Pesanan</button>`;
                                } else {
                                    // actionButton = `<button onclick="konfirmasiPinjam('${idTrx}', 'BOOKED')" class="mt-4 w-full bg-primary hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors shadow-sm">Terima Sewaan</button>`;
                                    actionButton = `<button onclick="konfirmasiPinjam('${idTrx}', 'DISETUJUI')" class="mt-4 w-full bg-primary hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors shadow-sm">Terima Sewaan</button>`;
                                }
                            } else if (status === "BOOKED" || status === "DISETUJUI") {
                                statusColor = "text-blue-600 dark:text-blue-400"; 
                                statusText = "Barang Sedang Di-booking/Disewa"; 

                                if (trx.tipeOrder === 'DIJUAL') {
                                    actionButton = `<button onclick="konfirmasiBeli('${idTrx}', 'selesai')" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors shadow-sm">Tandai Selesai</button>`;
                                } else {
                                    actionButton = `<button onclick="konfirmasiPinjam('${idTrx}', 'SELESAI')" class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition-colors shadow-sm">Tandai Selesai</button>`;
                                }
                            }

                            htmlContent += `
                                <div class="bg-white dark:bg-cardbg rounded-2xl p-5 border border-gray-200 dark:border-darkborder shadow-sm mb-4 hover:shadow-md transition-shadow">
                                    <div class="flex flex-wrap items-start justify-between gap-4">
                                        <div>
                                            <h3 class="text-lg font-bold text-gray-900 dark:text-white">${namaBarang}</h3>
                                            <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Dipesan oleh: <span class="font-bold text-gray-700 dark:text-gray-300">${namaPembeli}</span></p>
                                            <p class="text-sm text-gray-500 dark:text-gray-400">ID Transaksi: <span class="font-mono text-gray-600 dark:text-gray-400">${idTrx}</span></p>
                                        </div>
                                        <div class="text-right">
                                            <span class="text-lg font-bold text-primary">${formatHarga}</span>
                                            <span class="block text-sm font-semibold ${labelBg} px-3 py-0.5 rounded-full mt-1">${trx.tipeOrder}</span>
                                        </div>
                                    </div>
                                    <div class="mt-4 pt-4 border-t border-gray-100 dark:border-darkborder/50">
                                        <p class="text-sm font-semibold text-gray-700 dark:text-gray-300 flex justify-between items-center">
                                            <span>Status: <span class="${statusColor}">${statusText}</span></span>
                                        </p>
                                        ${actionButton}
                                    </div>
                                </div>
                            `;
                        });
                        window.sellContentHTML = htmlContent;
                    }

                    if(document.getElementById('tab-sell').classList.contains('bg-primary')) {
                        document.getElementById('transaction-list').innerHTML = window.sellContentHTML;
                    }
                })
                .catch(error => console.error("Error fetching sell data:", error));
        }
        // ── FUNGSI AKSI KONFIRMASI (BELI & PINJAM) ──
        async function konfirmasiBeli(expectedId, aksi) {
            // 1. Munculkan kotak isian (prompt) seperti di detail-barang
            const inputId = prompt("Masukkan ID Transaksi Beli untuk konfirmasi (Bisa disalin dari teks di atas):");
            
            // Jika user menekan Cancel atau membiarkan kosong
            if (!inputId) return; 

            // 2. Validasi Keamanan: Pastikan ID yang diketik COCOK dengan ID pesanan ini
            if (inputId.trim() !== String(expectedId)) {
                alert("GAGAL: ID Transaksi yang Anda masukkan salah atau tidak cocok!");
                return;
            }
            
            try {
                const response = await fetch(`/api/transaksi-beli/${inputId.trim()}/${aksi}`, { method: 'POST' });
                
                if (response.ok) {
                    alert("Status transaksi berhasil diperbarui!");
                    window.location.reload(); // Memuat ulang halaman agar status berubah
                } else {
                    const errorText = await response.text();
                    alert(`Gagal memperbarui status transaksi.\nAlasan Server: ${errorText || 'Ditolak oleh backend'}`);
                }
            } catch (error) {
                console.error("Error jaringan:", error);
                alert("Terjadi kesalahan jaringan atau server mati.");
            }
        }

        async function konfirmasiPinjam(expectedId, statusBaru) {
            // 1. Munculkan kotak isian (prompt)
            const inputId = prompt("Masukkan ID Transaksi Sewa untuk konfirmasi (Bisa disalin dari teks di atas):");
            
            // Jika user menekan Cancel atau membiarkan kosong
            if (!inputId) return;

            // 2. Validasi Keamanan: Pastikan ID yang diketik COCOK
            if (inputId.trim() !== String(expectedId)) {
                alert("GAGAL: ID Transaksi yang Anda masukkan salah atau tidak cocok!");
                return;
            }
            
            try {
                const getRes = await fetch(`/api/pinjam/${inputId.trim()}`);
                if (!getRes.ok) throw new Error("Gagal mengambil data transaksi lama dari server");
                
                const data = await getRes.json();
                data.status = statusBaru;

                const putRes = await fetch(`/api/pinjam/${inputId.trim()}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (putRes.ok) {
                    alert("Status transaksi berhasil diperbarui!");
                    window.location.reload(); // Memuat ulang halaman
                } else {
                    const errorText = await putRes.text();
                    alert(`Gagal memperbarui status transaksi.\nAlasan Server: ${errorText || 'Ditolak oleh backend'}`);
                }
            } catch (error) {
                console.error("Error jaringan:", error);
                alert(`Terjadi kesalahan: ${error.message}`);
            }
        }

        // ── TAB SWITCHER ──
        const tabBuy = document.getElementById('tab-buy');
        const tabSell = document.getElementById('tab-sell');
        const transactionList = document.getElementById('transaction-list');

        tabBuy.addEventListener('click', () => {
            tabBuy.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-sm";
            tabSell.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200";
            transactionList.innerHTML = window.buyContentHTML;
        });

        tabSell.addEventListener('click', () => {
            tabSell.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all bg-primary text-white shadow-sm";
            tabBuy.className = "px-5 py-2.5 rounded-lg text-sm font-bold transition-all text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200";
            transactionList.innerHTML = window.sellContentHTML;
        });
    </script>

</body>
