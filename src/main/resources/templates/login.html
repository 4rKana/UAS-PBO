<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - CampShare</title>
    <!-- Bootstrap 5 CDN + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #0a0f1c;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            background: #0d1425;
            border-radius: 32px;
            border: 1px solid #1e2a4a;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            padding: 2rem 1.8rem;
            max-width: 450px;
            width: 100%;
            transition: 0.2s;
        }
        .login-card h2 {
            color: #f0f3ff;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }
        .login-card .sub {
            color: #8a99c4;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            border-left: 3px solid #2c4b9e;
            padding-left: 0.75rem;
        }
        .form-control, .form-control:focus {
            background: #111a2b;
            border: 1px solid #253b60;
            color: #eef2ff;
            border-radius: 18px;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #2d6bcb;
            box-shadow: 0 0 0 3px rgba(45, 107, 203, 0.25);
            background: #0f172f;
        }
        .form-label {
            font-weight: 500;
            margin-left: 0.5rem;
            margin-bottom: 0.4rem;
            color: #b9c7f0;
            font-size: 0.85rem;
        }
        .btn-login {
            background: #0b2b5e;
            border: none;
            padding: 0.75rem;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            background: linear-gradient(95deg, #0f2b4f, #0a1c3a);
            border: 1px solid #2b4880;
            transition: 0.2s;
        }
        .btn-login:hover {
            background: linear-gradient(95deg, #1c3e6e, #0f2850);
            border-color: #3b68b0;
            transform: scale(1.01);
        }
        .register-link {
            color: #7f9fdf;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link:hover {
            color: #b6d0ff;
            text-decoration: underline;
        }
        .brand-icon {
            font-size: 2.8rem;
            color: #2c6bcb;
            background: #0b1424;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 28px;
            margin-bottom: 1rem;
            border: 1px solid #243961;
        }
        @media (max-width: 480px) {
            .login-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-icon mx-auto">
        <i class="bi bi-box-seam"></i>
    </div>
    <h2 class="text-center">Masuk</h2>
    <p class="sub text-center">CampShare — platform berbagi & sewa barang</p>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-person-circle me-1"></i> Username</label>
            <input type="text" name="username" class="form-control" placeholder="contoh: aldi_campshare" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label"><i class="bi bi-lock-fill me-1"></i> Password</label>
            <input type="password" name="password" class="form-control" placeholder="********" required>
        </div>
        <button type="submit" class="btn btn-login w-100">Login <i class="bi bi-arrow-right-circle-fill ms-1"></i></button>
    </form>

    <div class="text-center mt-4">
        <span class="text-light-emphasis" style="color:#99a9d4;">Belum punya akun? </span>
        <a th:href="@{/register}" class="register-link">Daftar sekarang</a>
    </div>
    <hr class="my-4" style="background-color: #1f2b46;">
    <div class="text-center small" style="color:#4a608b;">&copy; CampShare — sharing economy</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
