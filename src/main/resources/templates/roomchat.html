    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* PERBAIKAN: Padding bottom dihapus dari sini agar tidak melayang */
        body { font-family: 'Inter', sans-serif; }

        /* Menyembunyikan scrollbar agar tampilan chat bersih */
        .invisible-scrollbar::-webkit-scrollbar { display: none; }
        .invisible-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* === CSS SIDEBAR MOBILE === */
        .mobile-nav-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 999;
            opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .mobile-nav-overlay.open { opacity: 1; visibility: visible; }

        .mobile-nav {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #fff; z-index: 1000; padding: 24px 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1); overflow-y: auto;
            display: flex; flex-direction: column;
        }
        html.dark .mobile-nav { background: #1c1f2e; }
        .mobile-nav.open { left: 0; }

        .mobile-nav .close-btn {
            align-self: flex-end; background: none; border: none; font-size: 24px;
            color: #6b7280; cursor: pointer; padding: 4px 8px; margin-bottom: 16px;
        }
        html.dark .mobile-nav .close-btn { color: #9ca3af; }

        .mobile-nav .nav-logo-mobile { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .mobile-nav .nav-logo-mobile .logo-icon {
            width: 40px; height: 40px; background: #3b5bdb; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .mobile-nav .nav-logo-mobile .logo-icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; }
        .mobile-nav .nav-logo-mobile span { font-size: 20px; font-weight: 800; color: #1a1a2e; }
        html.dark .mobile-nav .nav-logo-mobile span { color: #fff; }

        .mobile-nav .nav-links-mobile { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .mobile-nav .nav-links-mobile a {
            padding: 12px 16px; border-radius: 12px; font-size: 15px; font-weight: 600;
            color: #6b7280; text-decoration: none; transition: background 0.15s, color 0.15s;
        }
        .mobile-nav .nav-links-mobile a:hover { background: #f3f4f6; }
        .mobile-nav .nav-links-mobile a.active { background: #eef2ff; color: #3b5bdb; }
        html.dark .mobile-nav .nav-links-mobile a { color: #9ca3af; }
        html.dark .mobile-nav .nav-links-mobile a:hover { background: #2d3040; }
        html.dark .mobile-nav .nav-links-mobile a.active { background: #1e2a4a; color: #60a5fa; }

        .mobile-nav .nav-divider { border-top: 1px solid #e5e7ef; margin: 12px 0; }
        html.dark .mobile-nav .nav-divider { border-top-color: #3f3f46; }

        /* === CSS BOTTOM NAVIGATION === */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
            background: #fff; border-top: 1px solid #e5e7ef;
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100; transition: background 0.25s, border-color 0.25s; padding: 0 8px;
        }
        html.dark .bottom-nav { background: #1c1f2e; border-top-color: #3f3f46; }
        .bottom-nav a {
            display: flex; flex-direction: column; align-items: center; gap: 1px;
            text-decoration: none; font-size: 10px; font-weight: 600; color: #9ca3af;
            padding: 4px 12px; border-radius: 8px; transition: color 0.15s, background 0.15s; min-width: 56px;
        }
        .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .bottom-nav a.active { color: #3b5bdb; }
        .bottom-nav a.active svg { stroke: #3b5bdb; }
        html.dark .bottom-nav a.active { color: #60a5fa; }
        html.dark .bottom-nav a.active svg { stroke: #60a5fa; }

        @media (min-width: 768px) {
            .mobile-nav-overlay, .mobile-nav, .bottom-nav { display: none; }
        }
        @media (max-width: 767px) {
            .desktop-nav, .desktop-search { display: none !important; }
            /* PERBAIKAN: Padding bawah otomatis hilang jika class ini dihapus (saat masuk ruang chat) */
            body.has-bottom-nav { padding-bottom: 64px; }
        }
    </style>
</head>

            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <span>Transaksi</span>
        </a>
        <a href="form-barang">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span>Upload</span>
        </a>
        <a href="notifikasi">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            <span>Notifikasi</span>
        </a>
        <a href="profil">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span>Profil</span>
        </a>
    </div>

    <script>
        // =========================================================
        // 1. LOGIKA BAWAAN TEMPLATE (DARK MODE & UI RESPONSIVE)
        // =========================================================
        
        // Logika Sidebar Mobile Navbar Utama
        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            if(nav && overlay) {
                nav.classList.toggle('open');
                overlay.classList.toggle('open');
                document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
            }
        }
        function closeMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            if(nav && overlay) {
                nav.classList.remove('open');
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }
        }

        // Logika Perpindahan Chat Kiri & Kanan (HP)
        const sidebarChat = document.getElementById('sidebar-chat');
        const ruangChat = document.getElementById('ruang-chat');
        const bottomNav = document.querySelector('.bottom-nav'); 
        const mainBody = document.getElementById('main-body');

        // Saat chat diklik (Menerima nama kontak yang diklik)
        function bukaChat(namaKontak) {
            if (namaKontak) {
                activeRecipient = namaKontak; // Ganti lawan bicara aktif
                
                // Reset notifikasi kontak ini menjadi 0 karena pesannya sudah dibaca/dibuka
                const kontak = daftarKontak.find(k => k.nama === namaKontak);
                if (kontak) kontak.unread = 0;
                
                loadChatHistory(currentUser, activeRecipient); // Tarik history chat orang tersebut dari DB
                renderDaftarKontak(); // Segarkan tampilan daftar kontak kiri untuk hapus notif & pindah background aktif
            }

            if (window.innerWidth < 768) {
                if(sidebarChat) {
                    sidebarChat.classList.add('hidden');
                    sidebarChat.classList.remove('flex');
                }
                if(ruangChat) {
                    ruangChat.classList.remove('hidden');
                    ruangChat.classList.add('flex');
                }
                if (bottomNav) bottomNav.style.display = 'none'; 
                if (mainBody) mainBody.classList.remove('has-bottom-nav');
            }
        }

        // Saat panah back (<-) diklik di HP
        function kembaliKeDaftar() {
            if(sidebarChat) {
                sidebarChat.classList.remove('hidden');
                sidebarChat.classList.add('flex');
            }
            if(ruangChat) {
                ruangChat.classList.add('hidden');
                ruangChat.classList.remove('flex');
            }
            if (bottomNav) bottomNav.style.display = 'flex'; 
            if (mainBody) mainBody.classList.add('has-bottom-nav');
        }

        // Cegah bug tampilan kalau layar di-rotate dari HP ke Desktop
        window.addEventListener('resize', () => {
            if (!sidebarChat || !ruangChat) return;
            if (window.innerWidth >= 768) {
                sidebarChat.classList.remove('hidden');
                sidebarChat.classList.add('flex');
                ruangChat.classList.remove('hidden');
                ruangChat.classList.add('flex');
                if (bottomNav) bottomNav.style.display = 'none';
            } else {
                sidebarChat.classList.remove('hidden');
                sidebarChat.classList.add('flex');
                ruangChat.classList.add('hidden');
                ruangChat.classList.remove('flex');
                if (bottomNav) bottomNav.style.display = 'flex';
            }
        });

        // Logika Menu Tiga Titik & Upload Popover
        const btnChatOptions = document.getElementById('btn-chat-options');
        const dropdownChatOptions = document.getElementById('dropdown-chat-options');
        const btnAttach = document.getElementById('btn-attach');
        const popoverAttach = document.getElementById('popover-attach');

        if(btnChatOptions) {
            btnChatOptions.addEventListener('click', (e) => {
                e.stopPropagation();
                if(dropdownChatOptions) dropdownChatOptions.classList.toggle('hidden');
                if(popoverAttach) popoverAttach.classList.add('hidden');
            });
        }
        if(btnAttach) {
            btnAttach.addEventListener('click', (e) => {
                e.stopPropagation();
                if(popoverAttach) popoverAttach.classList.toggle('hidden');
                if(dropdownChatOptions) dropdownChatOptions.classList.add('hidden');
            });
        }
        document.addEventListener('click', () => {
            if(popoverAttach) popoverAttach.classList.add('hidden');
            if(dropdownChatOptions) dropdownChatOptions.classList.add('hidden');
        });

        // Logika Dark Mode
        const html = document.documentElement;
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const themeToggleMobile = document.getElementById('theme-toggle-mobile');
        const themeLabelMobile = document.getElementById('theme-label-mobile');

        function updateIcons() {
            if (html.classList.contains('dark')) {
                if(sunIcon) sunIcon.classList.remove('hidden');
                if(moonIcon) moonIcon.classList.add('hidden');
                if(themeLabelMobile) themeLabelMobile.textContent = 'Mode Terang';
            } else {
                if(sunIcon) sunIcon.classList.add('hidden');
                if(moonIcon) moonIcon.classList.remove('hidden');
                if(themeLabelMobile) themeLabelMobile.textContent = 'Mode Gelap';
            }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }
        updateIcons();

        function toggleTheme() {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            updateIcons();
        }
        if(themeToggleBtn) themeToggleBtn.addEventListener('click', toggleTheme);
        if(themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);


// =========================================================
    // 2. LOGIKA UTAMA: WEBSOCKET CHAT REAL-TIME (100% DINAMIS)
    // =========================================================
    const backendUrl = "http://localhost:8080";
    let stompClient = null;

    // Nama kamu otomatis acak & anonim tiap kali refresh halaman
    const currentUser = "User_" + Math.floor(Math.random() * 1000); 
    
    // Mulai dari KOSONG. Tidak ada nama Dika, Maya, atau User_333 yang ditulis manual!
    let daftarKontak = []; 
    let activeRecipient = ""; 

    const kontainerPesan = document.getElementById('kontainer-pesan');
    const inputPesan = document.getElementById('input-pesan');
    const btnKirim = document.getElementById('btn-kirim');
    const namaLawanBicara = document.getElementById('nama-lawan-bicara');

    // Fungsi mengambil daftar kontak lama yang pernah chat dengan kita dari Backend Database
    async function muatDaftarKontakDariBackend() {
        try {
            const response = await fetch(`${backendUrl}/api/chat/contacts/${currentUser}`);
            if (response.ok) {
                const data = await response.json();
                // Format data dari backend dimasukkan ke array daftarKontak
                daftarKontak = data.map(user => ({
                    nama: user.username,
                    inisial: user.username.substring(0, 2).toUpperCase(),
                    pesanTerakhir: user.lastMessage || "",
                    waktu: user.lastMessageTime || "",
                    unread: user.unreadCount || 0
                }));
                
                // Jika ada kontak dari database, otomatis aktifkan kontak pertama
                if (daftarKontak.length > 0 && !activeRecipient) {
                    activeRecipient = daftarKontak[0].nama;
                    loadChatHistory(currentUser, activeRecipient);
                }
                renderDaftarKontak();
            }
        } catch (error) {
            console.log("Belum ada riwayat kontak di database, siap menerima pesan baru.");
        }
    }

    // Hubungkan ke WebSocket backend Spring Boot
    function connectWebSocket() {
        const socket = new SockJS(`${backendUrl}/ws`); 
        stompClient = Stomp.over(socket);
        stompClient.connect({}, function (frame) {
            console.log("Terhubung ke WebSocket sebagai: " + currentUser);
            
            // Menguping jalur antrean khusus untuk nama kita
            stompClient.subscribe(`/queue/messages/${currentUser}`, function (response) {
                const pesanBaru = JSON.parse(response.body);
                
                // ⚡ DINAMIS: Cari apakah pengirim pesan sudah ada di daftar kiri atau belum
                let kontak = daftarKontak.find(k => k.nama === pesanBaru.sender);
                
                if (!kontak) {
                    // Jika ADA ORANG BARU yang chat, otomatis buatkan slot barunya di sini!
                    kontak = {
                        nama: pesanBaru.sender,
                        inisial: pesanBaru.sender.substring(0, 2).toUpperCase(),
                        pesanTerakhir: pesanBaru.content,
                        waktu: new Date(pesanBaru.timestamp || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        unread: 0
                    };
                    daftarKontak.unshift(kontak); // Masukkan ke urutan paling atas sidebar
                } else {
                    // Jika orangnya sudah ada, tinggal perbarui pesan terakhirnya
                    kontak.pesanTerakhir = pesanBaru.content;
                    kontak.waktu = new Date(pesanBaru.timestamp || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }

                // Tambah notifikasi angka kalau kamu lagi ga buka room chat orang itu
                if (pesanBaru.sender !== activeRecipient) {
                    kontak.unread += 1;
                }

                // Jika room chat masih kosong/belum ada yang aktif, langsung otomatis buka chat orang ini
                if (!activeRecipient) {
                    bukaChat(pesanBaru.sender);
                }

                renderDaftarKontak(); // Segarkan tampilan sidebar kiri

                // Render bubble chat jika pesannya berasal dari orang yang sedang dibuka ruang obrolannya
                if (pesanBaru.sender === activeRecipient) {
                    tampilkanBubbleChat(pesanBaru);
                    scrollKeBawah();
                }
            });
        }, function (error) {
            setTimeout(connectWebSocket, 5000); 
        });
    }

    // Mengirim pesan private ke backend
    function kirimPesan() {
        if (!inputPesan || !activeRecipient) return;
        const text = inputPesan.value.trim();
        if (!text || !stompClient) return;
        
        const objekPesan = { 
            sender: currentUser, 
            recipient: activeRecipient, 
            content: text,
            timestamp: new Date().toISOString()
        };
        
        stompClient.send("/app/private-message", {}, JSON.stringify(objekPesan));
        
        // Perbarui pesan terakhir kita di sidebar kiri secara dinamis
        let kontak = daftarKontak.find(k => k.nama === activeRecipient);
        if (kontak) {
            kontak.pesanTerakhir = text;
            kontak.waktu = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            renderDaftarKontak();
        }

        tampilkanBubbleChat(objekPesan);
        scrollKeBawah();
        inputPesan.value = ''; 
    }

    // Mengambil riwayat obrolan dari database
    async function loadChatHistory(user1, user2) {
        if (!kontainerPesan || !user2) return;
        try {
            if(namaLawanBicara) namaLawanBicara.textContent = user2;
            kontainerPesan.innerHTML = ''; 
            
            const response = await fetch(`${backendUrl}/api/chat/history/${user1}/${user2}`);
            if (response.ok) {
                const listPesan = await response.json();
                listPesan.forEach(pesan => tampilkanBubbleChat(pesan));
                scrollKeBawah();
            }
        } catch (error) { 
            console.error("Gagal memuat history chat:", error); 
        }
    }

    // Merender tampilan HTML list kontak kiri secara dinamis
    function renderDaftarKontak() {
        const kontainer = document.getElementById('kontainer-kontak');
        const badgeTotal = document.getElementById('total-notif');
        if (!kontainer) return;

        kontainer.innerHTML = '';
        let totalUnread = 0;

        // Jika benar-benar belum ada chat sama sekali
        if (daftarKontak.length === 0) {
            kontainer.innerHTML = '<p class="text-center text-xs text-gray-400 mt-10">Belum ada pesan masuk</p>';
            if (badgeTotal) badgeTotal.classList.add('hidden');
            return;
        }

        daftarKontak.forEach(kontak => {
            const isAktif = kontak.nama === activeRecipient;
            totalUnread += kontak.unread;

            const itemKontak = document.createElement('div');
            itemKontak.className = `p-4 flex gap-3 cursor-pointer border-l-4 transition-colors ${isAktif ? 'bg-blue-50/50 dark:bg-blue-950/20 border-primary' : 'border-transparent hover:bg-gray-50 dark:hover:bg-cardbg/40'}`;
            itemKontak.setAttribute('onclick', `bukaChat('${kontak.nama}')`);

            itemKontak.innerHTML = `
                <div class="w-11 h-11 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shrink-0">${kontak.inisial}</div>
                <div class="flex-1 min-w-0">
                    <div class="flex justify-between items-baseline mb-0.5">
                        <h2 class="text-sm font-semibold text-gray-900 dark:text-white truncate">${kontak.nama}</h2>
                        <span class="text-xs text-gray-400 shrink-0">${kontak.waktu}</span>
                    </div>
                    <p class="text-xs text-gray-500 dark:text-gray-400 truncate">${kontak.pesanTerakhir}</p>
                </div>
                ${kontak.unread >= 1 ? `<div class="bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full shrink-0 self-center">${kontak.unread}</div>` : ''}
            `;
            kontainer.appendChild(itemKontak);
        });

        if (badgeTotal) {
            if (totalUnread >= 1) {
                badgeTotal.textContent = `${totalUnread} baru`;
                badgeTotal.classList.remove('hidden');
            } else {
                badgeTotal.classList.add('hidden');
            }
        }
    }

    function tampilkanBubbleChat(pesan) {
        if (!kontainerPesan) return;
        const isMe = pesan.sender === currentUser;
        const bubbleWrapper = document.createElement('div');
        bubbleWrapper.className = `flex ${isMe ? 'justify-end' : 'justify-start'} mb-4`;
        
        const waktu = pesan.timestamp ? new Date(pesan.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

        bubbleWrapper.innerHTML = `
            <div class="max-w-[70%] rounded-2xl px-4 py-2.5 text-sm ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white dark:bg-[#1e1e24] text-gray-900 dark:text-gray-100 rounded-tl-none border border-gray-100 dark:border-transparent'}" style="box-shadow: 0 1px 2px rgba(0,0,0,0.05)">
                <p class="leading-relaxed break-words">${pesan.content}</p>
                <span class="text-[10px] block text-right mt-1 ${isMe ? 'text-blue-200' : 'text-gray-400'}">
                    ${waktu}
                </span>
            </div>`;
        kontainerPesan.appendChild(bubbleWrapper);
    }

    function scrollKeBawah() { 
        if (kontainerPesan) kontainerPesan.scrollTop = kontainerPesan.scrollHeight; 
    }

    // Inisialisasi awal halaman
    document.addEventListener("DOMContentLoaded", () => {
        connectWebSocket();
        muatDaftarKontakDariBackend(); // Tarik kontak asli dari DB backend jika ada
        renderDaftarKontak(); // Render awal (akan memunculkan "Belum ada pesan masuk")
        
        if(btnKirim) btnKirim.addEventListener('click', kirimPesan);
        if(inputPesan) {
            inputPesan.addEventListener('keypress', (e) => { 
                if (e.key === 'Enter') kirimPesan(); 
            });
        }
    });

     // 1. Ambil nama user dari LocalStorage
            const username = localStorage.getItem("username");
            
            // 2. Jika ada nama, buat inisial dan masukkan ke avatar
            if (username) {
                const inisial = username.split(" ").map(n => n[0]).join("").toUpperCase().substring(0, 2);
                const avatarEl = document.getElementById("dashboard-avatar");
                if (avatarEl) {
                    avatarEl.textContent = inisial;
                }
            }
    </script>
</body>
