<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CampusShare - Pesan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6', 
                        sale: '#ff6b00',    
                        rent: '#00a843',    
                        darkbg: '#18181b',  
                        cardbg: '#27272a',  
                        darkborder: '#3f3f46' 
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* PERBAIKAN: Padding bottom dihapus dari sini agar tidak melayang */
        body { font-family: 'Inter', sans-serif; }

        /* Menyembunyikan scrollbar agar tampilan chat bersih */
        .invisible-scrollbar::-webkit-scrollbar { display: none; }
        .invisible-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* === CSS SIDEBAR MOBILE === */
        .mobile-nav-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 999;
            opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .mobile-nav-overlay.open { opacity: 1; visibility: visible; }

        .mobile-nav {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #fff; z-index: 1000; padding: 24px 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1); overflow-y: auto;
            display: flex; flex-direction: column;
        }
        html.dark .mobile-nav { background: #1c1f2e; }
        .mobile-nav.open { left: 0; }

        .mobile-nav .close-btn {
            align-self: flex-end; background: none; border: none; font-size: 24px;
            color: #6b7280; cursor: pointer; padding: 4px 8px; margin-bottom: 16px;
        }
        html.dark .mobile-nav .close-btn { color: #9ca3af; }

        .mobile-nav .nav-logo-mobile { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .mobile-nav .nav-logo-mobile .logo-icon {
            width: 40px; height: 40px; background: #3b5bdb; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .mobile-nav .nav-logo-mobile .logo-icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; }
        .mobile-nav .nav-logo-mobile span { font-size: 20px; font-weight: 800; color: #1a1a2e; }
        html.dark .mobile-nav .nav-logo-mobile span { color: #fff; }

        .mobile-nav .nav-links-mobile { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .mobile-nav .nav-links-mobile a {
            padding: 12px 16px; border-radius: 12px; font-size: 15px; font-weight: 600;
            color: #6b7280; text-decoration: none; transition: background 0.15s, color 0.15s;
        }
        .mobile-nav .nav-links-mobile a:hover { background: #f3f4f6; }
        .mobile-nav .nav-links-mobile a.active { background: #eef2ff; color: #3b5bdb; }
        html.dark .mobile-nav .nav-links-mobile a { color: #9ca3af; }
        html.dark .mobile-nav .nav-links-mobile a:hover { background: #2d3040; }
        html.dark .mobile-nav .nav-links-mobile a.active { background: #1e2a4a; color: #60a5fa; }

        .mobile-nav .nav-divider { border-top: 1px solid #e5e7ef; margin: 12px 0; }
        html.dark .mobile-nav .nav-divider { border-top-color: #3f3f46; }

        /* === CSS BOTTOM NAVIGATION === */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
            background: #fff; border-top: 1px solid #e5e7ef;
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100; transition: background 0.25s, border-color 0.25s; padding: 0 8px;
        }
        html.dark .bottom-nav { background: #1c1f2e; border-top-color: #3f3f46; }
        .bottom-nav a {
            display: flex; flex-direction: column; align-items: center; gap: 1px;
            text-decoration: none; font-size: 10px; font-weight: 600; color: #9ca3af;
            padding: 4px 12px; border-radius: 8px; transition: color 0.15s, background 0.15s; min-width: 56px;
        }
        .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .bottom-nav a.active { color: #3b5bdb; }
        .bottom-nav a.active svg { stroke: #3b5bdb; }
        html.dark .bottom-nav a.active { color: #60a5fa; }
        html.dark .bottom-nav a.active svg { stroke: #60a5fa; }

        @media (min-width: 768px) {
            .mobile-nav-overlay, .mobile-nav, .bottom-nav { display: none; }
        }
        @media (max-width: 767px) {
            .desktop-nav, .desktop-search { display: none !important; }
            /* PERBAIKAN: Padding bawah otomatis hilang jika class ini dihapus (saat masuk ruang chat) */
            body.has-bottom-nav { padding-bottom: 64px; }
        }
    </style>
</head>
<body id="main-body" th:data-user-id="${session.userId}" class="bg-gray-50 dark:bg-darkbg transition-colors duration-200">

    <div class="mobile-nav-overlay" id="mobileNavOverlay" onclick="closeMobileNav()"></div>
    <div class="mobile-nav" id="mobileNav">
        <button class="close-btn" onclick="closeMobileNav()">✕</button>
        <div class="nav-logo-mobile">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                </svg>
            </div>
            <span>CampusShare</span>
        </div>
        <div class="nav-links-mobile">
            <a href="dashboard">Katalog</a>
            <a href="papan-request">Request</a>
            <a href="form-barang">Upload</a>
            <a href="transaksi">Transaksi</a>
            <a href="profil">Profil</a>
        </div>
        <div class="nav-divider"></div>
        <div class="text-sm text-gray-500 dark:text-gray-400 p-2">
            <button id="theme-toggle-mobile" class="flex items-center gap-2 w-full p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-darkbg transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <span id="theme-label-mobile">Mode Gelap</span>
            </button>
        </div>
    </div>

    <header class="bg-white dark:bg-darkbg border-b border-gray-200 dark:border-darkborder/50 h-16 shrink-0 z-50 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full flex items-center justify-between">
            <div class="flex items-center gap-3 flex-1">
                <button id="menu-toggle" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" onclick="toggleMobileNav()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex items-center gap-3">
                    <a href="dashboard" class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-primary rounded-[12px] flex items-center justify-center shadow-sm">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                            </svg>
                        </div>
                        <span class="font-semibold text-[21px] tracking-tight text-gray-900 dark:text-white hidden sm:block">CampusShare</span>
                    </a>
                </div>
                <div class="hidden md:block w-full max-w-md relative ml-4 desktop-search">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input id="searchBarang" type="text" class="block w-full pl-10 pr-3 py-2 border-none rounded-full bg-gray-100 dark:bg-cardbg text-sm placeholder-gray-500 focus:ring-2 focus:ring-primary/30 outline-none dark:text-gray-200 transition-colors" placeholder="Cari barang, buku, peralatan...">
                </div>
            </div>

            <div class="flex items-center gap-5">
                <nav class="hidden lg:flex items-center gap-2 text-[15px] font-medium desktop-nav">
                    <a href="dashboard" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white px-4 py-2 rounded-xl transition-all">Katalog</a>
                    <a href="papan-request" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white px-4 py-2 rounded-xl transition-all">Request</a>
                    <a href="form-barang" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white px-4 py-2 rounded-xl transition-all">Upload</a>
                </nav>
                <div class="flex items-center gap-3 border-l pl-5 border-gray-200 dark:border-darkborder/50">
                    <button id="theme-toggle" class="p-2 text-gray-400 hover:bg-gray-100 dark:hover:bg-cardbg rounded-full transition-colors hidden md:block">
                        <svg id="sun-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                        <svg id="moon-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    </button>
                    <a href="notifikasi" class="p-2 text-gray-400 hover:text-gray-500 relative flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-cardbg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                        <span id="notif-bell-dot" class="hidden absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white dark:border-darkbg"></span>
                    </a>
                    <button class="p-2 text-primary bg-blue-50 dark:bg-blue-900/20 relative flex items-center justify-center rounded-full transition-colors cursor-default">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </button>
                    <a href="profil" class="inline-block">
                        <div
                        id="dashboard-avatar"
                        class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold text-xs cursor-pointer ml-1">
                        </div>                    
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden max-w-[100rem] w-full mx-auto relative h-[calc(100vh-4rem)]">
        
        <section id="sidebar-chat" class="w-full md:w-80 lg:w-96 border-r border-gray-200 dark:border-darkborder/50 flex flex-col bg-white dark:bg-darkbg shrink-0 h-full transition-all">
            
            <div class="p-5 pb-3 shrink-0">
                <div class="flex items-center justify-between px-4 py-2">
                    <h1 class="text-2xl font-bold text-gray-950 dark:text-white">Pesan</h1>
                    <button id="addChatBtn" onclick="toggleSearchBox()" class="p-1.5 bg-primary text-white rounded-full hover:bg-blue-600 transition-colors focus:outline-none" title="Tambah Obrolan Baru">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                    </button>
                </div>

                <div id="searchUserContainer" class="hidden px-4 mb-3">
                    <input type="text" id="searchUserInput" placeholder="Ketik Username lalu tekan Enter..." 
                        class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary dark:bg-cardbg dark:border-darkborder dark:text-white" />
                </div>
            </div>

            <div id="chatList" class="flex-1 overflow-y-auto divide-y divide-gray-100 dark:divide-darkborder/30 invisible-scrollbar pb-20 md:pb-0">
                </div>
        </section>

        <section id="ruang-chat"
            class="hidden md:flex flex-1 flex-col h-full relative overflow-hidden">
            
            <div class="px-4 md:px-6 py-3 bg-white dark:bg-darkbg border-b border-gray-200 dark:border-darkborder/50 flex items-center justify-between shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="kembaliKeDaftar()" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-white rounded-full transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                        </svg>
                    </button>
                        <div
                        id="chatAvatar"
                        class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm">
                        --
                        </div>

                        <div>
                            <h2
                            id="activeChatName"
                            class="text-sm font-semibold text-gray-900 dark:text-white">
                                Pilih Obrolan
                            </h2>
                        </div>
                </div>
                
                <div class="relative">
                    <button id="btn-chat-options"
                        class="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 rounded-full hover:bg-gray-100 dark:hover:bg-cardbg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z">
                            </path>
                        </svg>
                    </button>

                    <div id="dropdown-chat-options"
                        class="hidden absolute right-0 top-full mt-1 w-48 bg-white dark:bg-cardbg border border-gray-200 dark:border-darkborder rounded-2xl shadow-xl py-2 z-50 animate-fade-in">

                        <!-- Bersihkan Obrolan -->
                        <button id="btnClearChat"
                            class="w-full px-4 py-2.5 text-left text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-darkbg/50 flex items-center gap-3 transition-colors">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                                </path>
                            </svg>
                            Bersihkan Obrolan
                        </button>

                        <div class="h-px bg-gray-200 dark:bg-darkborder my-1"></div>

                        <!-- Blokir Pengguna -->
                        <button id="btnBlockUser"
                            class="w-full px-4 py-2.5 text-left text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 flex items-center gap-3 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636">
                                </path>
                            </svg>
                            Blokir Pengguna
                        </button>

                    </div>
                </div>
            </div>

            <div class="bg-amber-50 dark:bg-amber-950/20 border-b border-amber-100 dark:border-amber-900/30 px-6 py-2.5 flex items-center gap-2 text-xs text-amber-700 dark:text-amber-400 shrink-0 z-10">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>Pesan menghilang setelah 24 jam untuk privasi Anda.</span>
            </div>

            <div
            id="chatContainer"
            class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 invisible-scrollbar bg-gray-50 dark:bg-[#111113]">
            </div>

            <div
            class="sticky bottom-0 p-3 md:p-4 bg-white dark:bg-darkbg border-t border-gray-200 dark:border-darkborder/50 flex items-center gap-3 z-50">
                <div class="relative">
                    <button id="btn-attach"
                        class="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors rounded-full hover:bg-gray-100 dark:hover:bg-cardbg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13">
                            </path>
                        </svg>
                    </button>

                    <div id="popover-attach"
                        class="hidden absolute bottom-14 left-0 bg-white dark:bg-cardbg border border-gray-200 dark:border-darkborder rounded-2xl shadow-xl py-2 w-40 z-50 animate-fade-in">

                        <!-- Kamera -->
                        <button id="cameraBtn"
                            class="w-full px-4 py-2.5 text-left text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-darkbg/50 flex items-center gap-3 transition-colors">
                            <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z">
                                </path>
                            </svg>
                            Kamera
                        </button>

                        <!-- Galeri -->
                        <button id="galleryBtn"
                            class="w-full px-4 py-2.5 text-left text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-darkbg/50 flex items-center gap-3 transition-colors">
                            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                </path>
                            </svg>
                            Galeri Foto
                        </button>

                    </div>

                    <!-- Input Kamera -->
                    <input
                        type="file"
                        id="cameraInput"
                        accept="image/*"
                        capture="environment"
                        hidden>

                    <!-- Input Galeri -->
                    <input
                        type="file"
                        id="galleryInput"
                        accept="image/*"
                        hidden>

                </div>

                <input id="messageInput" type="text" class="flex-1 px-4 py-2.5 text-[15px] bg-gray-100 dark:bg-cardbg border-none rounded-full placeholder-gray-400 text-gray-800 dark:text-gray-200 outline-none focus:ring-2 focus:ring-primary/30 transition-all" placeholder="Ketik pesan...">
                
                <button id="sendBtn" class="p-3 bg-primary text-white rounded-full hover:bg-blue-600 transition-colors shadow-sm shrink-0">
                    <svg class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
        </section>
    </main>

    <div class="bottom-nav md:hidden">
        <a href="dashboard">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
            <span>Beranda</span>
        </a>
        <a href="transaksi">

            <span>Profil</span>

    </div>

    <script> 
        const currentUserId = document.body.dataset.userId;
        let currentConversation = null;
        let kunciHariTerakhirDitampilkan = null; // Melacak hari dari bubble terakhir yang tampil di layar, untuk tahu kapan perlu sisip separator tanggal baru

        // ==========================================
        // FORMAT WAKTU ALA WHATSAPP
        // Dipakai di chat list (preview waktu) dan di setiap bubble chat.
        // - Hari ini       -> jam saja, misal "14:32"
        // - Kemarin        -> "Kemarin"
        // - 2-6 hari lalu  -> nama hari, misal "Selasa"
        // - Lebih lama lagi -> tanggal lengkap, misal "24/06/2026"
        // ==========================================
        function formatWaktuChat(isoString) {
            if (!isoString) return "";

            const tanggalPesan = new Date(isoString);
            const sekarang = new Date();

            // Normalisasi ke awal hari (00:00) masing-masing, supaya selisih
            // hari dihitung berdasarkan KALENDER, bukan jarak 24 jam mentah.
            // (Penting: pesan jam 23:50 kemarin dan jam 00:10 hari ini hanya
            // berselisih 20 menit, tapi tetap harus dianggap beda hari.)
            const awalHariPesan = new Date(tanggalPesan.getFullYear(), tanggalPesan.getMonth(), tanggalPesan.getDate());
            const awalHariSekarang = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate());

            const selisihHari = Math.round((awalHariSekarang - awalHariPesan) / (1000 * 60 * 60 * 24));

            const jamMenit = tanggalPesan.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });

            if (selisihHari === 0) {
                return jamMenit; // Hari ini -> jam saja
            }
            if (selisihHari === 1) {
                return "Kemarin";
            }
            if (selisihHari > 1 && selisihHari < 7) {
                // Dalam seminggu terakhir -> nama hari
                return tanggalPesan.toLocaleDateString("id-ID", { weekday: "long" });
            }
            // Lebih dari seminggu (atau tanggal pesan di masa depan, kasus langka) -> tanggal lengkap
            return tanggalPesan.toLocaleDateString("id-ID", { day: "2-digit", month: "2-digit", year: "numeric" });
        }

        // Versi khusus untuk bubble chat: selalu tampilkan JAM di sampingnya
        // juga (selain label hari), supaya tetap informatif seperti WhatsApp
        // yang menampilkan jam di setiap bubble pesan apapun harinya.
        function formatWaktuBubble(isoString) {
            if (!isoString) return "";
            const tanggalPesan = new Date(isoString);
            return tanggalPesan.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
        }

        // Label untuk separator tanggal di tengah chat (mis. saat hari berganti),
        // sama formatnya dengan formatWaktuChat TAPI "Hari ini" untuk hari ini
        // (bukan jam), karena ini dipakai sebagai judul pemisah, bukan timestamp.
        function formatLabelTanggalSeparator(isoString) {
            const tanggalPesan = new Date(isoString);
            const sekarang = new Date();

            const awalHariPesan = new Date(tanggalPesan.getFullYear(), tanggalPesan.getMonth(), tanggalPesan.getDate());
            const awalHariSekarang = new Date(sekarang.getFullYear(), sekarang.getMonth(), sekarang.getDate());
            const selisihHari = Math.round((awalHariSekarang - awalHariPesan) / (1000 * 60 * 60 * 24));

            if (selisihHari === 0) return "Hari ini";
            if (selisihHari === 1) return "Kemarin";
            if (selisihHari > 1 && selisihHari < 7) return tanggalPesan.toLocaleDateString("id-ID", { weekday: "long" });
            return tanggalPesan.toLocaleDateString("id-ID", { day: "2-digit", month: "long", year: "numeric" });
        }

        // Mengembalikan "kunci hari" (YYYY-MM-DD lokal) dari sebuah timestamp,
        // dipakai untuk mendeteksi kapan hari berganti antar pesan yang berurutan.
        function kunciHari(isoString) {
            const d = new Date(isoString);
            return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        }

        // Membuat elemen separator tanggal (pil abu-abu di tengah, seperti WhatsApp)
        function buatElemenDateSeparator(isoString) {
            return `
                <div class="flex justify-center my-3">
                    <span class="text-xs font-medium text-gray-500 dark:text-gray-400 bg-gray-200 dark:bg-cardbg px-3 py-1 rounded-full">
                        ${formatLabelTanggalSeparator(isoString)}
                    </span>
                </div>
            `;
        }

        // Membuat HTML satu bubble pesan (kanan/kiri tergantung pengirim),
        // sudah menyertakan jam di bagian bawah bubble seperti WhatsApp.
        function buatElemenBubble(msg, isOwnMessage) {
            const jam = formatWaktuBubble(msg.createdAt);

            if (isOwnMessage) {
                return `
                    <div class="flex gap-3 max-w-lg ml-auto justify-end">
                        <div class="text-right">
                            <div class="bg-primary text-white px-4 py-3 rounded-2xl rounded-tr-none shadow-sm text-sm leading-relaxed">
                                ${msg.message}
                            </div>
                            <span class="text-[11px] text-gray-400 dark:text-gray-500 mt-1 block">${jam}</span>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex gap-3 max-w-lg">
                    <div>
                        <div class="bg-white dark:bg-cardbg px-4 py-3 rounded-2xl rounded-tl-none shadow-sm text-sm text-gray-800 dark:text-gray-200 leading-relaxed border border-gray-100 dark:border-darkborder/50">
                            ${msg.message}
                        </div>
                        <span class="text-[11px] text-gray-400 dark:text-gray-500 mt-1 block">${jam}</span>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // WEBSOCKET (STOMP) - CHAT REAL-TIME
        // ==========================================
        let stompClient = null;
        let currentSubscription = null; // Subscription topic conversation yang sedang aktif

        function connectWebSocket() {
            const socket = new SockJS("/ws");
            stompClient = Stomp.over(socket);

            // Matikan log debug bawaan stomp.js di console (opsional, biar console bersih)
            stompClient.debug = null;

            stompClient.connect({}, () => {
                console.log("WebSocket terhubung.");

                // Subscribe GLOBAL (sekali saja, tidak perlu unsubscribe/resubscribe
                // saat pindah-pindah chat) untuk tahu kapan harus refresh chat list
                // di sebelah kiri — baik urutannya (terbaru di atas) maupun preview
                // pesannya — terlepas dari conversation mana yang sedang dibuka.
                stompClient.subscribe(`/topic/chatlist/${currentUserId}`, (frame) => {
                    console.log("[chatlist] Event refresh diterima:", frame.body);
                    loadChatList(false);
                });

                // Kalau saat connect/reconnect user sudah berada di sebuah conversation,
                // langsung subscribe ulang (berguna saat koneksi putus-sambung).
                if (currentConversation) {
                    subscribeToConversation(currentConversation);
                }
            }, (error) => {
                console.error("WebSocket error, mencoba reconnect dalam 3 detik...", error);
                setTimeout(connectWebSocket, 3000);
            });
        }

        function subscribeToConversation(conversationId) {
            if (!stompClient || !stompClient.connected) return;

            // Lepas subscription topic sebelumnya agar tidak menumpuk
            // (mis. saat pindah dari chat A ke chat B)
            if (currentSubscription) {
                currentSubscription.unsubscribe();
                currentSubscription = null;
            }

            currentSubscription = stompClient.subscribe(
                `/topic/chat/${conversationId}`,
                (frame) => {
                    const msg = JSON.parse(frame.body);
                    appendMessageToChat(msg);
                }
            );
        }

        // Menambahkan satu pesan baru ke tampilan chat tanpa reload seluruh percakapan
        function appendMessageToChat(msg) {
            // Pastikan pesan ini memang untuk conversation yang sedang dibuka
            if (String(msg.conversationId) !== String(currentConversation)) return;

            const chatContainer = document.getElementById("chatContainer");
            const isOwnMessage = String(msg.senderId) === String(currentUserId);

            // Kalau hari dari pesan baru ini berbeda dari bubble terakhir yang
            // tampil di layar (misal chat dibiarkan terbuka lewat tengah malam),
            // sisipkan separator tanggal baru dulu sebelum bubble-nya.
            const kunciHariPesanIni = kunciHari(msg.createdAt);
            if (kunciHariPesanIni !== kunciHariTerakhirDitampilkan) {
                chatContainer.insertAdjacentHTML("beforeend", buatElemenDateSeparator(msg.createdAt));
                kunciHariTerakhirDitampilkan = kunciHariPesanIni;
            }

            chatContainer.insertAdjacentHTML("beforeend", buatElemenBubble(msg, isOwnMessage));

            scrollChatToBottom();

            // Kalau pesan yang baru masuk BUKAN dari diri sendiri, dan percakapan ini
            // sedang terbuka, langsung tandai sebagai sudah dibaca juga — supaya
            // indikator titik merah di halaman lain tidak menyala tanpa alasan
            // (karena pesan ini sudah langsung terlihat oleh user saat ini).
            if (!isOwnMessage) {
                markConversationAsRead(currentConversation);
            }

            // Catatan: refresh chat list (urutan & preview) sekarang ditangani oleh
            // subscription GLOBAL /topic/chatlist/{userId} di connectWebSocket(),
            // bukan di sini lagi — supaya tetap ter-refresh juga untuk pesan yang
            // masuk ke conversation LAIN (yang sedang tidak dibuka, sehingga function
            // ini bahkan tidak terpanggil sama sekali untuk kasus tersebut).
        }

        window.addEventListener("DOMContentLoaded", () => {
            loadChatList();
            connectWebSocket();
            updateNotifBellIndicator(currentUserId);
        });

        // Titik merah pada tombol bel notifikasi (notifikasi umum: request,
        // transaksi, peminjaman, pembelian). TIDAK terkait status chat —
        // tombol chat di halaman ini sendiri tidak perlu indikator karena
        // sudah berada di halaman chat (cursor-default, tidak bisa diklik).
        async function updateNotifBellIndicator(userId) {
            try {
                const res = await fetch(`/api/notifications/${userId}/unread-count`);
                if (res.ok) {
                    const data = await res.json();
                    const dot = document.getElementById("notif-bell-dot");
                    if (dot) dot.classList.toggle("hidden", data.unreadCount <= 0);
                }
            } catch (error) {
                console.error("Gagal memuat jumlah notifikasi belum dibaca:", error);
            }
        }

        // 2. Hapus Chat: Mengirim perintah DELETE ke server
        document.getElementById("btnClearChat").addEventListener("click", async () => {
            if (!currentConversation || !confirm("Yakin ingin menghapus semua pesan di obrolan ini?")) return;
            
            try {
                const response = await fetch(`/api/chat/clear/${currentConversation}`, { method: 'DELETE' });
                if (response.ok) {
                    document.getElementById("chatContainer").innerHTML = ""; // Bersihkan layar secara instan
                }
            } catch (error) {
                alert("Gagal menghapus chat.");
            }
        });

        // 3. Blokir: Mengirim perintah POST ke server
        document.getElementById("btnBlockUser").addEventListener("click", async () => {
            if (!currentConversation || !confirm("Yakin ingin memblokir pengguna ini?")) return;
            
            try {
                const response = await fetch(`/api/chat/block/${currentConversation}`, { method: 'POST' });
                if (response.ok) {
                    alert("Pengguna berhasil diblokir.");
                    window.location.reload(); // Refresh untuk memperbarui status UI
                }
            } catch (error) {
                alert("Gagal memblokir pengguna.");
            }
        });

        // Kamera
        document.getElementById("cameraBtn").addEventListener("click", () => {
            document.getElementById("cameraInput").click();
        });

        // Galeri
        document.getElementById("galleryBtn").addEventListener("click", () => {
            document.getElementById("galleryInput").click();
        });

        // Setelah memilih foto dari kamera
        document.getElementById("cameraInput").addEventListener("change", (e) => {
            const file = e.target.files[0];

            if (file) {
                alert("Foto dari kamera dipilih: " + file.name);

                // Nanti upload ke backend
                // uploadImage(file);
            }
        });

        // Setelah memilih foto dari galeri
        document.getElementById("galleryInput").addEventListener("change", (e) => {
            const file = e.target.files[0];

            if (file) {
                alert("Foto dari galeri dipilih: " + file.name);

                // Nanti upload ke backend
                // uploadImage(file);
            }
        });

        const username = localStorage.getItem("username");

        if(username){

            const inisial = username
                .split(" ")
                .map(n=>n[0])
                .join("")
                .substring(0,2)
                .toUpperCase();

            document.getElementById("dashboard-avatar")
                .textContent = inisial;

        }

        // Tambahkan deklarasi elemen yang kurang di sini
        const sidebarChat = document.getElementById('sidebar-chat');
        const ruangChat = document.getElementById('ruang-chat');
        const mainBody = document.getElementById('main-body');
        const bottomNav = document.querySelector('.bottom-nav'); // <- Ditambahkan agar tidak error

        // 1. MEMUAT DAFTAR CHAT (DI SEBELAH KIRI)
        async function loadChatList(autoOpenFirst = true) {
            // 1. Ambil ID User aktif dari attribute body secara dinamis
            const bodyEl = document.getElementById("main-body");
            const currentUserId = bodyEl ? bodyEl.getAttribute("data-user-id") : null;

            // Validasi jika user id tidak ditemukan (belum login / thymeleaf gagal)
            if (!currentUserId || currentUserId.startsWith("[[")) {
                console.error("Gagal memuat daftar chat: ID Pengguna tidak valid.");
                return;
            }

            try {
                // 2. Gunakan backtick ( ` ) dan ${currentUserId} -> BUKAN [[${session.userId}]] langsung
                const response = await fetch(`/api/chat/${currentUserId}`);

                if (!response.ok) {
                    throw new Error("Gagal mengambil pesan");
                }

                const chats = await response.json();
                console.log("[loadChatList] Data diterima, urutan ID:", chats.map(c => `${c.id}(${c.nama})`));
                                
                const chatListContainer = document.getElementById("chatList");
                if (chatListContainer) {
                    chatListContainer.innerHTML = ""; // Mengosongkan chat statis terdahulu

                    chats.forEach(chat => {
                     const chatItem = document.createElement("div");
                        chatItem.className =
                        "p-4 flex gap-3 cursor-pointer hover:bg-gray-100 dark:hover:bg-cardbg transition-colors";

                        chatItem.innerHTML = `
                        <div class="relative w-11 h-11 shrink-0">
                            <div class="w-11 h-11 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm">
                            ${(chat.nama || "?").substring(0,2).toUpperCase()}
                            </div>
                            ${chat.unreadCount > 0
                                ? '<span class="chat-item-unread-dot absolute -top-0.5 -right-0.5 w-3 h-3 bg-red-500 rounded-full border-2 border-white dark:border-darkbg"></span>'
                                : ""}
                        </div>

                        <div class="flex-1 min-w-0">

                            <div class="flex justify-between items-center">

                                <h2 class="text-sm font-semibold truncate text-gray-900 dark:text-white">
                                    ${chat.nama}
                                </h2>

                            <span class="text-xs text-gray-400 shrink-0 ml-2">${formatWaktuChat(chat.lastMessageAt)}</span>

                            </div>

                            <p class="chat-item-preview text-xs ${chat.unreadCount > 0 ? 'text-gray-900 dark:text-white font-medium' : 'text-gray-500 dark:text-gray-400'} truncate">
                                ${chat.lastMessage ?? ""}
                            </p>

                        </div>
                        `;

                        chatItem.onclick = () => {
                            // Hapus titik merah & gaya "belum dibaca" SEKETIKA saat diklik,
                            // tanpa menunggu response dari backend ataupun reload chat list.
                            const dot = chatItem.querySelector(".chat-item-unread-dot");
                            if (dot) dot.remove();

                            const preview = chatItem.querySelector(".chat-item-preview");
                            if (preview) {
                                preview.classList.remove("text-gray-900", "dark:text-white", "font-medium");
                                preview.classList.add("text-gray-500", "dark:text-gray-400");
                            }

                            loadConversation(chat.id, chat.nama);
                        };

                        chatListContainer.appendChild(chatItem);   
                    });

                    // Otomatis klik chat pertama jika ada data chat di database
                    // (hanya saat initial load / belum ada chat yang terbuka, bukan setiap refresh)
                    if (chats.length > 0) {
                        if (autoOpenFirst && !currentConversation) {
                            const firstChat = chats[0];
                            loadConversation(firstChat.id, firstChat.nama);
                        }
                    } else {
                        const activeChatName = document.getElementById("activeChatName");
                        if (activeChatName) activeChatName.textContent = "Tidak ada obrolan";
                    }
                }

            } catch (error) {
                console.error("Gagal memuat daftar chat:", error);
            }
        }

        // Memberitahu backend bahwa user saat ini sudah membaca percakapan ini
        // sampai waktu sekarang. Dipakai untuk menghitung indikator titik merah
        // chat di halaman lain. Tidak menunggu hasil (fire-and-forget) supaya
        // tidak menunda render chat itu sendiri.
        async function markConversationAsRead(conversationId) {
            try {
                await fetch(`/api/chat/read/${conversationId}?userId=${currentUserId}`, {
                    method: "POST"
                });
            } catch (error) {
                console.error("Gagal menandai percakapan sebagai dibaca:", error);
            }
        }

        // 2. MEMUAT ISI PESAN (DI RUANG CHAT)
        async function loadConversation(conversationId, namaLawanBicara) {
            currentConversation = conversationId;

            // Subscribe ke topic WebSocket khusus conversation ini,
            // supaya pesan baru (dari diri sendiri maupun lawan bicara) langsung muncul.
            subscribeToConversation(conversationId);

            // Tandai percakapan ini sebagai sudah dibaca oleh user saat ini.
            // Dipakai HANYA untuk indikator titik merah pada tombol chat di
            // halaman lain (misal notifikasi.html), tidak mempengaruhi tampilan
            // di sini. "Fire and forget" — tidak perlu await/blocking.
            markConversationAsRead(conversationId);

            // Update nama dan avatar di header chatroom menggunakan fungsi bawaan kamu
            updateChatHeader(
                namaLawanBicara || "Unknown",
                (namaLawanBicara || "?").charAt(0).toUpperCase(),
                "bg-blue-600"
            );

            try {
                const response = await fetch(`/api/chat/messages/${conversationId}`);

                if (!response.ok) {
                    throw new Error("Gagal mengambil pesan");
                }

                const messages = await response.json();

                const chatContainer =
                document.getElementById("chatContainer");

                chatContainer.innerHTML = "";

                let kunciHariSebelumnya = null;

                messages.forEach(msg => {
                    // Sisipkan separator tanggal setiap kali hari pesan berbeda
                    // dari pesan sebelumnya (atau ini pesan pertama di percakapan).
                    const kunciHariIni = kunciHari(msg.createdAt);
                    if (kunciHariIni !== kunciHariSebelumnya) {
                        chatContainer.insertAdjacentHTML("beforeend", buatElemenDateSeparator(msg.createdAt));
                        kunciHariSebelumnya = kunciHariIni;
                    }

                    // Pastikan perbandingan ID dilakukan dengan tipe data yang sama (string ke string)
                    const isOwnMessage = String(msg.senderId) === String(currentUserId);
                    chatContainer.insertAdjacentHTML("beforeend", buatElemenBubble(msg, isOwnMessage));
                });

                // Catat hari terakhir yang tampil, supaya pesan baru yang masuk lewat
                // WebSocket (appendMessageToChat) tahu apakah perlu separator baru.
                kunciHariTerakhirDitampilkan = kunciHariSebelumnya;

                // Otomatis scroll ke pesan paling bawah setelah dimuat
                scrollChatToBottom();

                // Logika responsive mobile bawaan kamu
                if (window.innerWidth < 768) {
                    sidebarChat.classList.add("hidden");
                    ruangChat.classList.remove("hidden");
                    ruangChat.classList.add("flex");
                    if(bottomNav) bottomNav.style.display = "none";
                    mainBody.classList.remove("has-bottom-nav");
                }
            } catch (error) {
                console.error("Gagal memuat pesan:", error);
            }
        }

        // 3. FUNGSI KIRIM PESAN
        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();

            if (!text || !currentConversation) return;

            // Kosongkan input segera supaya terasa responsif,
            // tidak perlu menunggu broadcast WebSocket datang.
            input.value = "";

            try {
                await fetch("/api/chat/send", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        conversationId: currentConversation,
                        senderId: currentUserId,
                        message: text
                    })
                });

                // Tidak perlu loadConversation()/loadChatList() manual di sini lagi.
                // Setelah backend menyimpan pesan, ia akan broadcast lewat WebSocket
                // ke topic /topic/chat/{conversationId}, dan appendMessageToChat()
                // akan menampilkannya secara otomatis (baik untuk pengirim maupun penerima).
            } catch (error) {
                console.error("Gagal mengirim pesan:", error);
                alert("Pesan gagal terkirim. Periksa koneksi internet kamu.");
            }
        }

        // Event listener saat halaman pertama kali dibuka
        window.addEventListener("DOMContentLoaded", () => {
            loadChatList();
        });

        document.getElementById("sendBtn").addEventListener("click", sendMessage);
        
        // Menambahkan trigger tombol Enter untuk mengirim pesan
        document.getElementById("messageInput").addEventListener("keypress", (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ==========================================
        // 1. LOGIKA UTAMA & RESPONSIVE (MOBILE)
        // ==========================================
        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            nav.classList.toggle('open');
            overlay.classList.toggle('open');
            document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
        }
        function closeMobileNav() {
            const nav = document.getElementById('mobileNav');
            const overlay = document.getElementById('mobileNavOverlay');
            nav.classList.remove('open');
            overlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        // Fungsi saat salah satu kontak di list kiri diklik
        function updateChatHeader(nama, inisial, bgClass) {

            const chatHeader = document.getElementById("activeChatName");
            const chatAvatar = document.getElementById("chatAvatar");

            chatHeader.textContent = nama;
            chatAvatar.textContent = inisial;

            chatAvatar.className =
                `w-10 h-10 rounded-full text-white flex items-center justify-center font-bold text-sm ${bgClass}`;

            if (window.innerWidth < 768) {
                sidebarChat.classList.add("hidden");
                ruangChat.classList.remove("hidden");
                ruangChat.classList.add("flex");
                mainBody.classList.remove("has-bottom-nav");
            }

            scrollChatToBottom();
        }

        function kembaliKeDaftar() {
            if (window.innerWidth < 768) {
                sidebarChat.classList.remove('hidden');
                sidebarChat.classList.add('flex');
                ruangChat.classList.add('hidden');
                ruangChat.classList.remove('flex');
                mainBody.classList.add('has-bottom-nav'); // Tampilkan kembali padding bottom nav
            }
        }

        // Jalankan reset tampilan jika ukuran layar di-resize dari HP ke Desktop
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                sidebarChat.classList.remove('hidden');
                sidebarChat.classList.add('flex');
                ruangChat.classList.remove('hidden');
                ruangChat.classList.add('flex');
            } else {
                if (ruangChat.classList.contains('hidden')) {
                    sidebarChat.classList.remove('hidden');
                }
            }
        });


        // ==========================================
        // 2. LOGIKA KIRIM PESAN REAL-TIME (DUMMY)
        // ==========================================
        const chatContainer = document.getElementById("chatContainer");
        const chatInput = ruangChat.querySelector('input[type="text"]');
        const sendBtn = ruangChat.querySelector('button .rotate-90').parentElement;

        function scrollChatToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ==========================================
        // 3. LOGIKA TOGGLE DROPDOWN & POPOVER
        // ==========================================
        const btnOptions = document.getElementById('btn-chat-options');
        const dropdownOptions = document.getElementById('dropdown-chat-options');
        const btnAttach = document.getElementById('btn-attach');
        const popoverAttach = document.getElementById('popover-attach');

        // Toggle opsi chat (titik tiga)
        btnOptions.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownOptions.classList.toggle('hidden');
            popoverAttach.classList.add('hidden'); // tutup popover sebelah jika terbuka
        });

        // Toggle popover attachment (klip kertas)
        btnAttach.addEventListener('click', (e) => {
            e.stopPropagation();
            popoverAttach.classList.toggle('hidden');
            dropdownOptions.classList.add('hidden'); // tutup dropdown sebelah jika terbuka
        });

        // Tutup semua popover/dropdown saat klik di luar area bebas
        document.addEventListener('click', () => {
            dropdownOptions.classList.add('hidden');
            popoverAttach.classList.add('hidden');
        });


        // ==========================================
        // 4. LOGIKA DARK / LIGHT MODE SWITCHER
        // ==========================================
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleMobileBtn = document.getElementById('theme-toggle-mobile');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const themeLabelMobile = document.getElementById('theme-label-mobile');

        function setDarkMode(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
                if (themeLabelMobile) themeLabelMobile.textContent = "Mode Terang";
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                document.documentElement.classList.add('light');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
                if (themeLabelMobile) themeLabelMobile.textContent = "Mode Gelap";
                localStorage.setItem('theme', 'light');
            }
        }

        // Cek preference tema user sebelumnya di LocalStorage
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setDarkMode(savedTheme === 'dark');

        themeToggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.contains('dark');
            setDarkMode(!isDark);
        });

        if (themeToggleMobileBtn) {
            themeToggleMobileBtn.addEventListener('click', () => {
                const isDark = document.documentElement.classList.contains('dark');
                setDarkMode(!isDark);
            });
        }

        // Jalankan scroll ke bawah saat pertama kali aplikasi dibuka
        window.onload = scrollChatToBottom;

        // Deklarasi Elemen DOM Pencarian
        const addChatBtn = document.getElementById("addChatBtn");
        const searchUserContainer = document.getElementById("searchUserContainer");
        const searchUserInput = document.getElementById("searchUserInput");

        // 1. Fungsi Toggle Tampil/Sembunyi Kotak Pencarian (Dipanggil via onclick HTML)
        function toggleSearchBox() {
            console.log("-> Fungsi toggleSearchBox() BERHASIL DIPANGGIL!");
            
            const container = document.getElementById("searchUserContainer");
            const input = document.getElementById("searchUserInput");
            
            if (container) {
                // Jika sedang tersembunyi (punya class hidden atau display none)
                if (container.classList.contains("hidden") || container.style.display === "none") {
                    container.classList.remove("hidden");
                    container.style.display = "block"; // Paksa browser menampilkan lewat inline CSS
                    console.log("-> Kotak pencarian DIPAKSA MUNCUL (display: block)");
                    if (input) input.focus();
                } else {
                    container.style.display = "none"; // Sembunyikan kembali jika diklik lagi
                    container.classList.add("hidden");
                    console.log("-> Kotak pencarian DISEMBUNYIKAN (display: none)");
                }
            } else {
                console.error("-> Elemen #searchUserContainer tidak ditemukan!");
            }
        }

        document.getElementById("searchUserInput").addEventListener("keypress", async (e) => {
            if (e.key === "Enter") {
                // 1. Ambil nilai input dari elemen yang memicu event
                const targetUsername = searchUserInput.value.trim();
                
                // 2. Ambil User ID dari atribut body (pastikan sudah diset sebelumnya)
                const currentUserId = document.body.getAttribute("data-user-id");

                if (!targetUsername) {
                    alert("Username tidak boleh kosong!");
                    return;
                }

                try {
                    // 3. Kirim ke Backend dengan parameter 'targetUsername'
                    const response = await fetch(`/api/chat/start?currentUserId=${currentUserId}&targetUsername=${targetUsername}`, {
                        method: "POST"
                    });

                    if (response.ok) {
                        const chatDto = await response.json();
                        
                        // Bersihkan input dan sembunyikan kotak
                        e.target.value = "";
                        const container = document.getElementById("searchUserContainer");
                        container.classList.add("hidden");
                        container.style.display = "none";
                        
                        // Refresh list & buka chat
                        await loadChatList();
                        if (typeof loadConversation === "function") {
                            loadConversation(chatDto.id, chatDto.nama);
                        }
                    } else {
                        const errorText = await response.text();
                        alert(errorText || "User tidak ditemukan.");
                    }
                } catch (error) {
                    console.error("Error saat memulai obrolan baru:", error);
                    alert("Terjadi masalah jaringan.");
                }
            }
        });
    </script>
</body>
</html>
