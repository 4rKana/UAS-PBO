    <style>
        body { font-family: 'Inter', sans-serif; padding-bottom: 72px; }

        /* === CSS SIDEBAR MOBILE === */
        .mobile-nav-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 999;
            opacity: 0; visibility: hidden; transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .mobile-nav-overlay.open { opacity: 1; visibility: visible; }

        .mobile-nav {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #fff; z-index: 1000; padding: 24px 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1); overflow-y: auto;
            display: flex; flex-direction: column;
        }
        html.dark .mobile-nav { background: #1c1f2e; }
        .mobile-nav.open { left: 0; }

        .mobile-nav .close-btn {
            align-self: flex-end; background: none; border: none; font-size: 24px;
            color: #6b7280; cursor: pointer; padding: 4px 8px; margin-bottom: 16px;
        }
        html.dark .mobile-nav .close-btn { color: #9ca3af; }

        .mobile-nav .nav-logo-mobile { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
        .mobile-nav .nav-logo-mobile .logo-icon {
            width: 40px; height: 40px; background: #3b5bdb; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .mobile-nav .nav-logo-mobile .logo-icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; }
        .mobile-nav .nav-logo-mobile span { font-size: 20px; font-weight: 800; color: #1a1a2e; }
        html.dark .mobile-nav .nav-logo-mobile span { color: #fff; }

        .mobile-nav .nav-links-mobile { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .mobile-nav .nav-links-mobile a {
            padding: 12px 16px; border-radius: 12px; font-size: 15px; font-weight: 600;
            color: #6b7280; text-decoration: none; transition: background 0.15s, color 0.15s;
        }
        .mobile-nav .nav-links-mobile a:hover { background: #f3f4f6; }
        .mobile-nav .nav-links-mobile a.active { background: #eef2ff; color: #3b5bdb; }
        html.dark .mobile-nav .nav-links-mobile a { color: #9ca3af; }
        html.dark .mobile-nav .nav-links-mobile a:hover { background: #2d3040; }
        html.dark .mobile-nav .nav-links-mobile a.active { background: #1e2a4a; color: #60a5fa; }

        .mobile-nav .nav-divider { border-top: 1px solid #e5e7ef; margin: 12px 0; }
        html.dark .mobile-nav .nav-divider { border-top-color: #3f3f46; }

        /* === CSS BOTTOM NAVIGATION === */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
            background: #fff; border-top: 1px solid #e5e7ef;
            display: flex; align-items: center; justify-content: space-around;
            z-index: 100; transition: background 0.25s, border-color 0.25s; padding: 0 8px;
        }
        html.dark .bottom-nav { background: #1c1f2e; border-top-color: #3f3f46; }
        .bottom-nav a {
            display: flex; flex-direction: column; align-items: center; gap: 1px;
            text-decoration: none; font-size: 10px; font-weight: 600; color: #9ca3af;
            padding: 4px 12px; border-radius: 8px; transition: color 0.15s, background 0.15s; min-width: 56px;
        }
        .bottom-nav a svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .bottom-nav a.active { color: #3b5bdb; }
        .bottom-nav a.active svg { stroke: #3b5bdb; }
        html.dark .bottom-nav a.active { color: #60a5fa; }
        html.dark .bottom-nav a.active svg { stroke: #60a5fa; }

        @media (min-width: 768px) {
            .mobile-nav-overlay, .mobile-nav, .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
        @media (max-width: 767px) {
            .desktop-nav, .desktop-search { display: none !important; }
        }
    </style>

<script>
    // ==========================================
    // 1. LOGIKA SIDEBAR MOBILE
    // ==========================================
    function toggleMobileNav() {
        const nav = document.getElementById('mobileNav');
        const overlay = document.getElementById('mobileNavOverlay');
        nav.classList.toggle('open');
        overlay.classList.toggle('open');
        document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
    }

    function closeMobileNav() {
        const nav = document.getElementById('mobileNav');
        const overlay = document.getElementById('mobileNavOverlay');
        nav.classList.remove('open');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    // ==========================================
    // 2. LOGIKA MODAL POP-UP
    // ==========================================
    const btnBukaPermintaan = document.getElementById('btn-buka-permintaan');
    const btnCloseModal = document.getElementById('btn-close-modal');
    const modalPermintaan = document.getElementById('modal-permintaan');

    if (btnBukaPermintaan) {
        btnBukaPermintaan.addEventListener('click', () => {
            modalPermintaan.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        });
    }

    if (btnCloseModal) {
        btnCloseModal.addEventListener('click', () => {
            modalPermintaan.classList.add('hidden');
            document.body.style.overflow = ''; 
        });
    }

    if (modalPermintaan) {
        modalPermintaan.addEventListener('click', (e) => {
            if (e.target === modalPermintaan) {
                modalPermintaan.classList.add('hidden');
                document.body.style.overflow = '';
            }
        });
    }

    // ==========================================
    // 3. LOGIKA DARK MODE
    // ==========================================
    const html = document.documentElement;
    const themeToggleBtn = document.getElementById('theme-toggle');
    const sunIcon = document.getElementById('sun-icon');
    const moonIcon = document.getElementById('moon-icon');
    const themeToggleMobile = document.getElementById('theme-toggle-mobile');
    const themeLabelMobile = document.getElementById('theme-label-mobile');

    function updateIcons() {
        if (html.classList.contains('dark')) {
            if(sunIcon) sunIcon.classList.remove('hidden');
            if(moonIcon) moonIcon.classList.add('hidden');
            if(themeLabelMobile) themeLabelMobile.textContent = 'Mode Terang';
        } else {
            if(sunIcon) sunIcon.classList.add('hidden');
            if(moonIcon) moonIcon.classList.remove('hidden');
            if(themeLabelMobile) themeLabelMobile.textContent = 'Mode Gelap';
        }
    }

    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
    } else {
        html.classList.remove('dark');
    }
    updateIcons();

    function toggleTheme() {
        html.classList.toggle('dark');
        localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        updateIcons();
    }

    if(themeToggleBtn) themeToggleBtn.addEventListener('click', toggleTheme);
    if(themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);


    // ==========================================
    // 4. LOGIKA CRUD BACKEND (SPRING BOOT API)
    // ==========================================
    // PENTING: Endpoint & parameter di bawah ini HARUS sama persis dengan
    // RequestController.java, RequestRepository.java, RequestBarang.java
    // yang sudah ada (tidak ada parameter requesterId/penawarId di backend,
    // dan StatusRequest hanya TERSEDIA & TERPENUHI).
    // Semua aturan "siapa boleh klik apa" dikerjakan di sini (front-end),
    // memakai localStorage sebagai penanda sementara di sisi browser.

    const API_BASE = 'http://localhost:8080/api/request';

    // Penanda lokal: siapa yang sudah menekan "Tawarkan Barang Saya" untuk
    // request tertentu. Backend tidak punya kolom ini, jadi disimpan di
    // localStorage browser pemilik request sebagai catatan sementara.
    // Struktur: { "<idRequest>": "<idUserPenawar>" }
    function getPenawarMap() {
        try {
            return JSON.parse(localStorage.getItem('penawarMap') || '{}');
        } catch (e) {
            return {};
        }
    }
    function setPenawar(idRequest, idUserPenawar) {
        const map = getPenawarMap();
        map[idRequest] = idUserPenawar;
        localStorage.setItem('penawarMap', JSON.stringify(map));
    }
    function getPenawar(idRequest) {
        return getPenawarMap()[idRequest] || null;
    }

    // Template pesan "kosong" yang dipakai ulang (data tidak ada / gagal dimuat)
    function renderEmptyState(container, { title, message, isError = false } = {}) {
        const iconColor = isError
            ? 'text-red-400 dark:text-red-400/80'
            : 'text-gray-400 dark:text-gray-500';

        container.innerHTML = `
        <div class="flex flex-col items-center justify-center text-center py-16 px-6 bg-white dark:bg-cardbg border border-dashed border-gray-200 dark:border-darkborder rounded-2xl">
            <svg class="w-12 h-12 mb-4 ${iconColor}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <p class="font-semibold text-gray-700 dark:text-gray-200 text-[15px]">${title}</p>
            <p class="text-gray-500 dark:text-gray-400 text-[13.5px] mt-1 max-w-xs">${message}</p>
        </div>`;
    }

    // A. Memuat Data Request dari Backend
    async function loadRequest() {
        const container = document.getElementById('list-permintaan');
        if (!container) return;

        // TAMBAHKAN INI: Pastikan selalu kosong sebelum isi data baru
        container.innerHTML = '';

        try {
            const response = await fetch(API_BASE);

            if (!response.ok) {
                renderEmptyState(container, {
                    title: 'Gagal memuat permintaan',
                    message: 'Server tidak merespons dengan benar. Coba muat ulang halaman.',
                    isError: true
                });
                return;
            }

            const data = await response.json();

            // === EMPTY STATE: tidak ada data sama sekali dari backend ===
            if (!Array.isArray(data) || data.length === 0) {
                renderEmptyState(container, {
                    title: 'Belum ada permintaan',
                    message: 'Jadilah yang pertama membuat permintaan barang lewat tombol "Buat Permintaan Baru" di atas.'
                });
                return;
            }

            const idUserLogin = localStorage.getItem("idUser");

            data.forEach(item => {
                // Logika penentuan warna badge status berdasarkan nilainya
                let statusBadgeClass = '';

                if (item.statusRequest === 'TERSEDIA') {
                    statusBadgeClass = 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400 font-semibold';
                } else if (item.statusRequest === 'TERPENUHI') {
                    statusBadgeClass = 'bg-gray-100 text-gray-600 dark:bg-zinc-800 dark:text-zinc-400 font-medium';
                } else {
                    statusBadgeClass = 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400';
                }

                const isPemilik = idUserLogin && String(item.userId) === String(idUserLogin);

                // --- Sembunyikan Tombol Hapus (poin 1) ---
                // Hanya muncul jika request ini milik user yang sedang login.
                const tombolHapus = (isPemilik && item.statusRequest === 'TERSEDIA')
                    ? `<button onclick="hapusRequest('${item.id}')" class="text-red-500 hover:text-red-600 text-[12px] font-medium transition-colors">Hapus</button>`
                    : '';

                // --- Update Status ---
                let tombolAksi = '';
                if (item.statusRequest === 'TERSEDIA' && !isPemilik) {
                // TAMPILAN PENOLONG (Belum diambil)
                    tombolAksi = `
                        <div class="flex items-center gap-2">
                            <a href="roomchat?targetUser=${item.username}" class="px-4 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-cardbg dark:text-gray-200 dark:border dark:border-darkborder text-[12.5px] font-semibold rounded-xl transition-colors">Tanya Pemilik</a>
                            <button onclick="terimaRequest('${item.id}')" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white text-[12.5px] font-semibold rounded-xl shadow-sm transition-colors">Ambil Request</button>
                        </div>`;
                } else if (item.statusRequest === 'TERPENUHI' && isPemilik) {
                    // TAMPILAN PEMILIK REQUEST (Ada yang ngambil)
                    tombolAksi = `
                        <div class="flex items-center gap-2">
                            <button onclick="batalPilih('${item.id}')" class="px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 dark:bg-red-950/30 dark:border dark:border-red-900/50 dark:text-red-400 text-[12.5px] font-semibold rounded-xl transition-colors">Batalkan Penolong</button>
                            <button onclick="selesaikanRequest('${item.id}')" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-[12.5px] font-semibold rounded-xl shadow-sm transition-colors">Tandai Selesai</button>
                        </div>`;
                } else if (item.statusRequest === 'TERPENUHI' && !isPemilik) {
                    // TAMPILAN ORANG LAIN (Sudah diambil)
                    tombolAksi = `<span class="text-[12.5px] font-medium text-gray-400 dark:text-gray-500 italic">Telah diambil orang lain</span>`;
                }

                container.innerHTML += `
            <div class="bg-white dark:bg-cardbg border border-gray-200 dark:border-darkborder rounded-2xl p-6 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <span class="font-semibold text-[16px] dark:text-white">${item.namaBarang}</span>
                        ${tombolHapus}
                    </div>
                    <p class="text-[14.5px] text-gray-500 dark:text-gray-400 mb-4">${item.deskripsi}</p>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[15px] text-blue-600 dark:text-blue-400 font-bold">Rp ${item.anggaran.toLocaleString('id-ID')}</span>
                        <span class="text-[11px] tracking-wide px-2.5 py-1 rounded-lg ${statusBadgeClass}">${item.statusRequest}</span>
                    </div>
                    ${tombolAksi ? `<div class="flex justify-end mt-4 border-t border-gray-100 dark:border-darkborder/50 pt-4">${tombolAksi}</div>` : ''}
                </div>`;
            });
        } catch (error) {
            console.error("Gagal memuat data:", error);
            renderEmptyState(container, {
                title: 'Tidak dapat terhubung ke server',
                message: 'Pastikan server backend (Spring Boot) sedang berjalan, lalu coba lagi.',
                isError: true
            });
        }
    }

    // D. Update Status: Ambil Request (Untuk Penolong)
    async function terimaRequest(id) {
        const idUserLogin = localStorage.getItem("idUser");
        if (!idUserLogin) return alert("Harap login terlebih dahulu.");

        if(confirm("Yakin ingin mengambil request ini dan membantu pemilik? Pastikan Anda sudah berdiskusi di obrolan.")) {
            try {
                // Sesuai API Backend: PUT /{id}/terima dengan body penolongId
                const response = await fetch(`${API_BASE}/${id}/terima`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ penolongId: idUserLogin })
                });

                if (response.ok) {
                    alert("Berhasil! Request sekarang menjadi tanggung jawab Anda.");
                    loadRequest();
                } else {
                    const errMsg = await response.text();
                    alert("Gagal mengambil request: " + errMsg);
                }
            } catch (error) {
                alert("Tidak dapat terhubung ke server.");
            }
        }
    }

    // E. BATALKAN PENOLONG (FUNGSI BARU UNTUK PEMILIK)
    async function batalPilih(id) {
        const idUserLogin = localStorage.getItem("idUser");
        if(confirm("Yakin ingin membatalkan penolong ini? Status request akan kembali TERSEDIA.")) {
            try {
                // Sesuai API Backend: PUT /{id}/batal-pilih dengan header userId
                const response = await fetch(`${API_BASE}/${id}/batal-pilih`, {
                    method: 'PUT',
                    headers: { 'userId': idUserLogin }
                });

                if (response.ok) {
                    alert("Berhasil! Status barang kembali TERSEDIA.");
                    loadRequest();
                } else {
                    const errMsg = await response.text();
                    alert("Gagal membatalkan: " + errMsg);
                }
            } catch (error) {
                alert("Tidak dapat terhubung ke server.");
            }
        }
    }

    let isSubmitting = false;

    // B. Mengirim Data Request Baru ke Backend
    async function submitForm(event) {
        event.preventDefault(); // Mencegah halaman reload otomatis

        // 1. Cek gembok: Jika sedang proses pengiriman, langsung hentikan fungsi
        if (isSubmitting) return;

        // 2. Kunci gembok: Set penanda bahwa proses sedang berjalan
        isSubmitting = true;

        // Tangkap tombol untuk di-disable secara visual
        const btnSubmit = event.target.querySelector('button[type="submit"]');
        const teksAsli = btnSubmit.innerHTML;
        
        // Ubah tampilan tombol jadi "Mengirim..." dan tidak bisa diklik
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = 'Mengirim...';
        btnSubmit.classList.add('opacity-50', 'cursor-not-allowed');

        const data = {
        namaBarang: document.getElementById('input-nama-barang').value,
        deskripsi: document.getElementById('input-deskripsi').value,
        anggaran: parseInt(document.getElementById('input-anggaran').value),
        // userId tidak perlu dikirim di body karena sudah di-set di Controller melalui Header
        };

        try {
            const response = await fetch(API_BASE, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'userId': localStorage.getItem("idUser")
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                document.getElementById('form-permintaan').reset(); // Reset isi input form
                document.getElementById('modal-permintaan').classList.add('hidden'); // Tutup modal
                document.body.style.overflow = ''; // Kembalikan scrollbar
                loadRequest(); // Refresh papan request agar data baru langsung muncul
            } else {
                const errorText = await response.text();
                alert("Gagal mengirim: " + errorText);
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Terjadi kesalahan jaringan.");
        }finally {
            // 3. Buka gembok kembali: Kembalikan tombol ke keadaan semula (baik sukses maupun gagal)
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = teksAsli;
            btnSubmit.classList.remove('opacity-50', 'cursor-not-allowed');
            isSubmitting = false;
            }
        }

    // C. Menghapus Data Request
    // Sesuai RequestController asli: DELETE /api/request/{id} (tanpa query param).
    // Tombolnya saja yang sudah disembunyikan untuk non-pemilik di loadRequest(),
    // jadi di sini cukup konfirmasi lalu hapus.
    async function hapusRequest(id) {
        if (confirm("Yakin ingin menghapus permintaan ini?")) {
            try {
                const response = await fetch(`${API_BASE}/${id}`, { 
                    method: 'DELETE',
                    headers: {
                        'userId': localStorage.getItem("idUser")
                    } 
                });

                if (!response.ok) {
                    const errorMsg = await response.text();
                    alert("Gagal" + errorMsg);
                    return;
                }
                loadRequest();
            } catch (error) {
                console.error("Gagal menghapus data:", error);
                alert("Tidak dapat terhubung ke server.");
            }
        }
    }

    // E. Update Status: Selesaikan Request (Untuk Pemilik)
    async function selesaikanRequest(id) {
        const idUserLogin = localStorage.getItem("idUser");
        try {
            // Tembak API selesai buatan Arya
            const response = await fetch(`${API_BASE}/${id}/selesai`, {
                method: 'PUT',
                headers: { 'userId': idUserLogin } // Header khusus yang diminta controller Arya
            });

            if (response.ok) {
                alert("Transaksi selesai!");
                loadRequest(); // Refresh daftar agar tombol hilang
            } else {
                alert("Gagal menyelesaikan transaksi.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Tidak dapat terhubung ke server.");
        }
    }

    // ==========================================
    // 5. EVENT LISTENERS UTAMA (INISIALISASI)
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        // Jalankan load data pertama kali saat halaman dibuka
        loadRequest();

        // PASANG LISTENER FORM DI SINI (Ini kunci perbaikannya!)
        const formPermintaan = document.getElementById('form-permintaan');
        if (formPermintaan) {
            formPermintaan.addEventListener('submit', submitForm);
        }
        
        // 1. Ambil nama user dari LocalStorage
        const username = localStorage.getItem("username");
        
        // 2. Jika ada nama, buat inisial dan masukkan ke avatar
        if (username) {
            const inisial = username.split(" ").map(n => n[0]).join("").toUpperCase().substring(0, 2);
            const avatarEl = document.getElementById("dashboard-avatar");
            if (avatarEl) {
                avatarEl.textContent = inisial;
            }
        }
    });
</script>
</body>
</html>
